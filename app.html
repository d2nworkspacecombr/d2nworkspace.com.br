<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2N Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Azul-marinho como cor dominante; teal reservado como toque de destaque */
  --navy-900:#0a1628;--navy-800:#0f1f3a;--navy-700:#15305c;--navy-600:#1d3f74;
  --teal:#22d3d3;--teal-deep:#0fa8a8;--teal-soft:#e3fbfb;
  --grad-navy:linear-gradient(135deg,var(--navy-600) 0%,var(--navy-900) 100%);
  --grad-accent:linear-gradient(135deg,var(--teal) 0%,var(--navy-700) 100%);
  --ink:#0e1626;--ink-soft:#5a6478;--ink-faint:#99a2b6;
  --paper:#f5f6fa;--surface:#fff;--line:#e9ebf1;
  --shadow-sm:0 1px 2px rgba(14,22,38,.04),0 1px 1px rgba(14,22,38,.03);
  --shadow-md:0 6px 20px rgba(14,22,38,.08),0 2px 5px rgba(14,22,38,.04);
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  /* compatibilidade com nomes de cor usados em outras partes do código */
  --navy:var(--navy-700);--navy-dark:var(--navy-800);--teal-dark:var(--teal-deep);--teal-light:var(--teal-soft);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:252px;flex-shrink:0;background:linear-gradient(195deg,var(--navy-900) 0%,#081222 100%);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;box-shadow:2px 0 24px rgba(0,0,0,.2)}
.sidebar-head{display:flex;align-items:center;gap:11px;padding:1.7rem 1.5rem 1.4rem}
.sidebar-head img{width:34px;height:34px;border-radius:9px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.brand-word{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(120deg,var(--teal) 0%,#6fa8d8 55%,#a9b8d8 100%);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;display:block;line-height:1.1}
.sidebar-head small{display:block;font-size:9.5px;letter-spacing:.1em;color:#5b7da3;text-transform:uppercase;font-weight:600;margin-top:2px}

.nav{flex:1;padding:.6rem .9rem;overflow-y:auto}
.nav-grupo-titulo{font-family:'Sora',sans-serif;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#3f5a82;padding:16px 14px 7px}
.nav-grupo-titulo:first-child{padding-top:6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 14px;margin-bottom:2px;border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:#9fb0c9;text-decoration:none;transition:background .15s,color .15s}
.nav a svg{width:16.5px;height:16.5px;flex-shrink:0;opacity:.85;transition:color .15s}
.nav a:hover{background:rgba(255,255,255,.05);color:#e3e9f3}
.nav a.active{background:var(--teal);color:var(--navy-900);font-weight:600}
.nav a.active svg{color:var(--navy-900);opacity:1}
.nav-em-breve{display:flex;align-items:center;gap:11px;padding:9px 14px;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:#445873;cursor:default}
.nav-em-breve svg{width:16.5px;height:16.5px;flex-shrink:0;opacity:.5}
.nav-em-breve em{margin-left:auto;font-style:normal;font-size:9px;background:rgba(255,255,255,.06);color:#6b85a8;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.03em}

.sidebar-foot{padding:1.1rem 1.2rem 1.3rem;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.07)}
.avatar{width:33px;height:33px;border-radius:50%;background:var(--grad-accent);display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;color:#fff;flex-shrink:0;text-transform:uppercase}
.sidebar-foot .quem{flex:1;min-width:0}
.sidebar-foot .nome{font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-foot .cargo{font-size:10.5px;color:#5b7da3;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.sidebar-foot button{background:rgba(255,255,255,.06);border:none;color:#9fb0c9;width:30px;height:30px;border-radius:var(--r-sm);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.sidebar-foot button:hover{background:rgba(255,255,255,.12);color:#fff}
.sidebar-foot button svg{width:14.5px;height:14.5px}

/* MAIN */
.main{flex:1;margin-left:252px;padding:3rem 3.5rem;max-width:1140px}
.eyebrow{font-family:'Sora',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-deep);margin-bottom:.55rem}
h1{font-family:'Sora',sans-serif;font-size:27px;font-weight:700;color:var(--navy-700);letter-spacing:-.012em;margin-bottom:.3rem}
.sub{font-size:12.5px;color:var(--ink-faint)}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r-sm);font-family:'Sora',sans-serif;
  font-size:12.5px;font-weight:600;letter-spacing:0;cursor:pointer;transition:transform .12s,box-shadow .15s,opacity .15s}
.btn-grad{background:var(--grad-navy);color:#fff;box-shadow:0 2px 10px rgba(10,22,40,.22)}
.btn-grad:hover{box-shadow:0 5px 16px rgba(10,22,40,.32);transform:translateY(-1px)}
.btn-navy{background:var(--navy-700);color:#fff}
.btn-navy:hover{background:var(--navy-800)}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--navy-700)}
.btn-outline:hover{border-color:var(--navy-600)}
.btn:disabled{opacity:.5;cursor:default;transform:none}

/* CARDS / TABELA */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.6rem;box-shadow:var(--shadow-sm)}
.empty{text-align:center;padding:3.2rem;color:var(--ink-faint);font-size:13px;line-height:1.7}
table{width:100%;border-collapse:collapse}
th{font-family:'Sora',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:600;text-align:left;padding:12px 16px;border-bottom:1px solid var(--line)}
td{padding:14px 16px;font-size:13.5px;border-bottom:1px solid var(--line)}
tr.linha{transition:background .12s}
tr.linha:hover td{background:var(--paper);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:20px;font-family:'Sora',sans-serif;
  font-size:10.5px;font-weight:600;letter-spacing:.02em;background:var(--paper);color:var(--navy-700);border:1px solid var(--line)}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal)}
.link{color:var(--navy-700);font-weight:600;text-decoration:none}
.link:hover{color:var(--teal-deep)}

/* FORM */
.field{margin-bottom:1.05rem}
.field label{display:block;font-family:'Sora',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-family:'Barlow',sans-serif;font-size:14px;background:var(--paper);outline:none;transition:border-color .15s,background .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--navy-600);background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.checks{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--ink-soft)}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:1.6rem}
.tab{padding:10px 16px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--ink-faint);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;margin-bottom:-1px;transition:color .15s}
.tab.active{color:var(--navy-700);border-bottom-color:var(--teal)}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.prog-track{flex:1;height:6px;background:var(--paper);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad-accent)}
.prog-input{width:58px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-family:'Sora',sans-serif}

.toast{position:fixed;bottom:26px;right:26px;background:var(--navy-800);color:#fff;padding:13px 22px;border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.22);display:none;z-index:999}
.hidden{display:none !important}
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <img src="logo-icon.png" alt="D2N">
      <div>
        <span class="brand-word">Workspace</span>
        <small>Carreira &amp; Negócios</small>
      </div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-foot">
      <div class="avatar" id="avatar-usuario">—</div>
      <div class="quem">
        <div class="nome" id="nome-usuario">—</div>
        <div class="cargo" id="cargo-usuario">—</div>
      </div>
      <button onclick="sair()" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================================
// CONFIG / AUTENTICAÇÃO
// ============================================================================
const token = localStorage.getItem('d2n_token');
const usuario = JSON.parse(localStorage.getItem('d2n_usuario') || 'null');

if (!token || !usuario) {
  // Limpa qualquer "crachá" inválido antes de voltar pro login,
  // pra nunca ficar num loop entre as duas páginas.
  localStorage.removeItem('d2n_token');
  localStorage.removeItem('d2n_refresh');
  localStorage.removeItem('d2n_usuario');
  window.location.href = 'index.html';
}

document.getElementById('nome-usuario').textContent = usuario?.nome || '';
document.getElementById('cargo-usuario').textContent =
  usuario?.role === 'admin' ? 'Administrador' : (usuario?.cargo || 'Colaborador');
document.getElementById('avatar-usuario').textContent =
  (usuario?.nome || '').trim().split(/\s+/).slice(0, 2).map((p) => p[0]).join('');

function sair() {
  localStorage.removeItem('d2n_token');
  localStorage.removeItem('d2n_refresh');
  localStorage.removeItem('d2n_usuario');
  window.location.href = 'index.html';
}

// Chamada padrão pra qualquer endpoint da API, já com o token incluído
async function api(path, options = {}) {
  const resp = await fetch('/api/' + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + token,
      ...(options.headers || {}),
    },
  });

  if (resp.status === 401) {
    sair();
    return null;
  }

  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.erro || 'Erro inesperado');
  return data;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => (el.style.display = 'none'), 2500);
}

function esc(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

// ============================================================================
// NAVEGAÇÃO (rotas por hash: #/, #/clientes, #/assessoria, #/assessoria/<id>)
// ============================================================================
const NAV_GRUPOS = [
  {
    titulo: 'Geral',
    itens: [
      { hash: '#/', label: 'Início', icone: '<path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/>' },
    ],
  },
  {
    titulo: 'Cadastro',
    itens: [
      { hash: '#/clientes', label: 'Clientes', icone: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>' },
      { hash: '#/colaboradores', label: 'Colaborador', icone: '<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/>' },
      { hash: '#/produtos', label: 'Produtos', icone: '<path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/>' },
    ],
  },
  {
    titulo: 'Negócios',
    itens: [
      { hash: '#/briefing', label: 'Briefing do cliente', icone: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/>' },
      { hash: '#/diagnostico', label: 'Diagnóstico', icone: '<circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>' },
      { hash: '#/assessoria', label: 'Assessoria', icone: '<rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>' },
      { hash: '#/social-media', label: 'Social Media', icone: '<rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>', em_breve: true },
    ],
  },
];

function renderNav() {
  const atual = location.hash || '#/';
  document.getElementById('nav').innerHTML = NAV_GRUPOS.map((grupo) => `
    <div class="nav-grupo-titulo">${grupo.titulo}</div>
    ${grupo.itens.map((r) => {
      if (r.em_breve) {
        return `
          <span class="nav-em-breve">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${r.icone}</svg>
            ${r.label}
            <em>em breve</em>
          </span>
        `;
      }
      return `
        <a href="${r.hash}" class="${atual === r.hash ? 'active' : ''}">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${r.icone}</svg>
          ${r.label}
        </a>
      `;
    }).join('')}
  `).join('');
}

window.addEventListener('hashchange', rotear);
window.addEventListener('DOMContentLoaded', rotear);

function rotear() {
  renderNav();
  const hash = location.hash || '#/';
  const partes = hash.replace('#/', '').split('/').filter(Boolean);

  if (partes[0] === 'assessoria' && partes[1]) {
    return viewAssessoriaDetalhe(partes[1]);
  }
  if (partes[0] === 'assessoria') return viewAssessoriaLista();
  if (partes[0] === 'clientes' && partes[1]) return viewClienteDetalhe(partes[1]);
  if (partes[0] === 'clientes') return viewClientesLista();
  if (partes[0] === 'colaboradores') return viewColaboradoresLista();
  if (partes[0] === 'produtos') return viewProdutosLista();
  if (partes[0] === 'briefing') return viewEmConstrucao('Briefing do cliente');
  if (partes[0] === 'diagnostico') return viewEmConstrucao('Diagnóstico');
  return viewInicio();
}

// ============================================================================
// VIEW: INÍCIO
// ============================================================================
function viewInicio() {
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">D2N Workspace</div>
    <h1>Olá, ${esc((usuario.nome || '').split(' ')[0])}</h1>
    <p class="sub" style="margin-top:.75rem;max-width:480px;font-size:14px;color:var(--ink-soft)">
      Use o menu à esquerda para acessar os clientes e os módulos de negócio.
    </p>
  `;
}

function viewEmConstrucao(titulo) {
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Negócios</div>
    <h1>${esc(titulo)}</h1>
    <div class="card" style="margin-top:1.25rem">
      <p class="empty">Esse módulo ainda está sendo construído.</p>
    </div>
  `;
}

// ============================================================================
// VIEW: CLIENTES (lista + cadastro)
// ============================================================================
async function viewClientesLista() {
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Cadastro</div>
    <h1>Clientes</h1>
    <div style="display:flex;justify-content:flex-end;margin:1.25rem 0 1rem">
      ${usuario.role === 'admin' ? `<button class="btn btn-grad" onclick="toggleFormCliente()">Novo cliente</button>` : ''}
    </div>
    <div id="form-cliente-wrap"></div>
    <div id="tabela-clientes" class="card"><p class="empty">Carregando...</p></div>
  `;

  try {
    const { clientes } = await api('clientes');
    renderTabelaClientes(clientes);
  } catch (e) {
    document.getElementById('tabela-clientes').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}

function renderTabelaClientes(clientes) {
  const el = document.getElementById('tabela-clientes');
  if (!clientes || clientes.length === 0) {
    el.innerHTML = `<p class="empty">Nenhum cliente cadastrado ainda.</p>`;
    return;
  }
  el.innerHTML = `
    <table>
      <thead><tr><th>Cliente</th><th>Segmento</th><th>Serviços</th><th>Status</th></tr></thead>
      <tbody>
        ${clientes.map((c) => `
          <tr class="linha" onclick="location.hash='#/clientes/${c.id}'">
            <td><a class="link" href="#/clientes/${c.id}">${esc(c.nome)}</a></td>
            <td>${esc(c.segmento) || '—'}</td>
            <td>${(c.servicos || []).join(', ') || '—'}</td>
            <td><span class="pill">${esc(c.status)}</span></td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

function toggleFormCliente() {
  const wrap = document.getElementById('form-cliente-wrap');
  if (wrap.innerHTML.trim() !== '') { wrap.innerHTML = ''; return; }

  const SERVICOS = [
    ['assessoria', 'Assessoria Estratégica'],
    ['marketing', 'Marketing de Redes Sociais'],
    ['comercial', 'Assessoria Comercial'],
    ['trafego_pago', 'Tráfego Pago'],
    ['big_bang', 'Big Bang da Marca'],
  ];

  wrap.innerHTML = `
    <div class="card" style="margin-bottom:1.25rem">
      <form id="novo-cliente-form">
        <div class="grid2">
          <div class="field">
            <label>Tipo de documento</label>
            <select name="tipo_documento">
              <option value="cnpj">CNPJ</option>
              <option value="cpf">CPF</option>
            </select>
          </div>
          <div class="field"><label>CNPJ / CPF</label><input name="cnpj_cpf" placeholder="00.000.000/0000-00"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Razão social</label><input name="razao_social"></div>
          <div class="field"><label>Nome fantasia</label><input name="nome" required placeholder="Como vai aparecer nos documentos"></div>
        </div>
        <div class="grid2">
          <div class="field"><label>Segmento</label><input name="segmento"></div>
          <div class="field"><label>Interlocutor</label><input name="interlocutor"></div>
        </div>
        <div class="field"><label>Telefone</label><input name="telefone"></div>
        <div class="field">
          <label>Serviços contratados</label>
          <div class="checks">
            ${SERVICOS.map(([id, label]) => `
              <label><input type="checkbox" name="servicos" value="${id}"> ${label}</label>
            `).join('')}
          </div>
        </div>
        <button class="btn btn-navy" type="submit">Salvar cliente</button>
      </form>
    </div>
  `;

  document.getElementById('novo-cliente-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const servicos = [...form.querySelectorAll('[name="servicos"]:checked')].map((c) => c.value);
    try {
      await api('clientes', {
        method: 'POST',
        body: JSON.stringify({
          nome: form.nome.value,
          razao_social: form.razao_social.value,
          tipo_documento: form.tipo_documento.value,
          cnpj_cpf: form.cnpj_cpf.value,
          segmento: form.segmento.value,
          interlocutor: form.interlocutor.value,
          telefone: form.telefone.value,
          servicos,
        }),
      });
      toast('Cliente criado com sucesso');
      wrap.innerHTML = '';

// VIEW: DETALHE DO CLIENTE (cadastro central + vínculos de colaboradores)
// ============================================================================
async function viewClienteDetalhe(clienteId) {
  document.getElementById('main').innerHTML = `<p class="empty">Carregando...</p>`;

  let cliente, vinculos, colaboradores;
  try {
    [{ cliente }, { vinculos }] = await Promise.all([
      api('clientes?id=' + clienteId),
      api('vinculos?cliente_id=' + clienteId),
    ]);
    if (usuario.role === 'admin') {
      ({ colaboradores } = await api('colaboradores'));
    }
  } catch (e) {
    document.getElementById('main').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
    return;
  }

  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Cliente</div>
    <h1>${esc(cliente.nome)}</h1>
    <p class="sub" style="margin-bottom:1.5rem">${esc(cliente.segmento)} · ${(cliente.servicos || []).join(', ')}</p>

    ${usuario.role === 'admin' ? `
    <div class="card">
      <h3 style="font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.04em;color:var(--navy);margin-bottom:4px">Colaboradores vinculados</h3>
      <p class="sub" style="margin-bottom:1rem">Só os colaboradores vinculados aqui veem e editam este cliente nos módulos correspondentes.</p>
      <div id="lista-vinculos" style="margin-bottom:1rem"></div>
      <div style="display:flex;gap:8px">
        <select id="sel-colaborador" style="flex:1;padding:9px;border:1.5px solid var(--line);border-radius:4px">
          <option value="">Selecione um colaborador...</option>
          ${(colaboradores || []).map((c) => `<option value="${c.id}">${esc(c.nome)}${c.cargo ? ' (' + esc(c.cargo) + ')' : ''}</option>`).join('')}
        </select>
        <select id="sel-modulo" style="padding:9px;border:1.5px solid var(--line);border-radius:4px">
          <option value="assessoria">Assessoria</option>
          <option value="marketing">Marketing</option>
          <option value="comercial">Comercial</option>
        </select>
        <button class="btn btn-navy" onclick="vincularColaborador('${clienteId}')">Vincular</button>
      </div>
    </div>
    ` : ''}
  `;

  if (usuario.role === 'admin') renderVinculos(vinculos);
}

function renderVinculos(vinculos) {
  const el = document.getElementById('lista-vinculos');
  if (!vinculos || vinculos.length === 0) {
    el.innerHTML = `<p class="sub">Nenhum colaborador vinculado ainda.</p>`;
    return;
  }
  el.innerHTML = vinculos.map((v) => `
    <div style="display:flex;justify-content:space-between;align-items:center;background:var(--surface);border-radius:5px;padding:8px 12px;margin-bottom:6px">
      <span style="font-size:13px">${esc(v.usuarios?.nome)} <span style="font-size:11px;color:var(--ink-faint);text-transform:uppercase">· ${esc(v.modulo)}</span></span>
      <button style="background:none;border:none;color:#e53e3e;font-size:11px;font-weight:700;text-transform:uppercase;cursor:pointer" onclick="removerVinculo('${v.id}')">Remover</button>
    </div>
  `).join('');
}

async function vincularColaborador(clienteId) {
  const usuario_id = document.getElementById('sel-colaborador').value;
  const modulo = document.getElementById('sel-modulo').value;
  if (!usuario_id) return toast('Selecione um colaborador');
  try {
    await api('vinculos', { method: 'POST', body: JSON.stringify({ cliente_id: clienteId, usuario_id, modulo }) });
    toast('Colaborador vinculado');
    viewClienteDetalhe(clienteId);
  } catch (e) { toast(e.message); }
}

async function removerVinculo(id) {
  const clienteId = location.hash.split('/')[2];
  try {
    await api('vinculos?id=' + id, { method: 'DELETE' });
    toast('Vínculo removido');
    viewClienteDetalhe(clienteId);
  } catch (e) { toast(e.message); }
}

// ============================================================================
// VIEW: ASSESSORIA — DETALHE DO CLIENTE (Sessões / Planejamento / OKRs)
// ============================================================================
const PILARES = ['Comercial', 'Marketing', 'Processos', 'Pessoas', 'Finanças'];
let abaAtual = 'sessoes';

async function viewAssessoriaDetalhe(clienteId) {
  document.getElementById('main').innerHTML = `<p class="empty">Carregando...</p>`;

  let cliente;
  try {
    ({ cliente } = await api('clientes?id=' + clienteId));
  } catch (e) {
    document.getElementById('main').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
    return;
  }

  abaAtual = 'sessoes';
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Plano de Assessoria</div>
    <h1>${esc(cliente.nome)}</h1>
    <p class="sub" style="margin-bottom:1.5rem">${cliente.interlocutor ? 'Interlocutor: ' + esc(cliente.interlocutor) : ''}</p>

    <div class="tabs">
      <button class="tab active" data-tab="sessoes">Sessões de atendimento</button>
      <button class="tab" data-tab="planejamento">Planejamento estratégico</button>
      <button class="tab" data-tab="okrs">Plano tático (OKRs)</button>
    </div>
    <div id="conteudo-aba"></div>
  `;

  document.querySelectorAll('.tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((b) => b.classList.remove('active'));
      btn.classList.add('active');
      abaAtual = btn.dataset.tab;
      renderAba(clienteId);
    });
  });

  renderAba(clienteId);
}

async function renderAba(clienteId) {
  const el = document.getElementById('conteudo-aba');
  el.innerHTML = `<p class="empty">Carregando...</p>`;

  if (abaAtual === 'sessoes') return renderAbaSessoes(clienteId, el);
  if (abaAtual === 'planejamento') return renderAbaPlanejamento(clienteId, el);
  if (abaAtual === 'okrs') return renderAbaOkrs(clienteId, el);
}

// --- Sessões ---
async function renderAbaSessoes(clienteId, el) {
  const { sessoes } = await api('sessoes?cliente_id=' + clienteId);
  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
      <button class="btn btn-grad" onclick="toggleFormSessao('${clienteId}')">Nova sessão</button>
    </div>
    <div id="form-sessao-wrap"></div>
    <div id="lista-sessoes">
      ${(!sessoes || sessoes.length === 0) ? `<div class="card"><p class="empty">Nenhuma sessão registrada ainda.</p></div>` :
        sessoes.map((s) => `
          <div class="card" style="margin-bottom:.75rem">
            <div style="display:flex;justify-content:space-between;margin-bottom:8px">
              <strong style="font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;color:var(--navy)">${esc(s.titulo)}</strong>
              <span class="sub">${new Date(s.data_sessao + 'T00:00:00').toLocaleDateString('pt-BR')}</span>
            </div>
            ${s.pauta ? `<p class="sub"><strong>Pauta:</strong> ${esc(s.pauta)}</p>` : ''}
            ${s.resumo ? `<p class="sub" style="margin-top:4px"><strong>Resumo:</strong> ${esc(s.resumo)}</p>` : ''}
            ${s.encaminhamentos ? `<p class="sub" style="margin-top:4px"><strong>Encaminhamentos:</strong> ${esc(s.encaminhamentos)}</p>` : ''}
          </div>
        `).join('')}
    </div>
  `;
}

function toggleFormSessao(clienteId) {
  const wrap = document.getElementById('form-sessao-wrap');
  if (wrap.innerHTML.trim() !== '') { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div class="card" style="margin-bottom:1rem">
      <form id="form-nova-sessao">
        <div class="grid2">
          <div class="field"><label>Título</label><input name="titulo" required></div>
          <div class="field"><label>Data</label><input type="date" name="data_sessao" required></div>

        method: 'POST',

          cliente_id: clienteId,

  });

// --- Planejamento (5 pilares) ---
async function renderAbaPlanejamento(clienteId, el) {
  const { planejamento } = await api('planejamento?cliente_id=' + clienteId);
  const porPilar = {};
  (planejamento || []).forEach((p) => (porPilar[p.pilar] = p));

  el.innerHTML = PILARES.map((pilar, i) => {
    const atual = porPilar[pilar] || {};
    return `
      <details class="card" style="margin-bottom:.75rem" ${i === 0 ? 'open' : ''}>
        <summary style="font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;color:var(--navy);font-weight:700;cursor:pointer">${pilar}</summary>
        <form class="form-pilar" data-pilar="${pilar}" style="margin-top:1rem">
          <div class="field"><label>Objetivo</label><textarea name="objetivo" rows="2">${esc(atual.objetivo)}</textarea></div>
          <div class="field"><label>Diagnóstico</label><textarea name="diagnostico" rows="2">${esc(atual.diagnostico)}</textarea></div>
          <div class="field"><label>Estratégia</label><textarea name="estrategia" rows="2">${esc(atual.estrategia)}</textarea></div>
          <button class="btn btn-navy" type="submit">Salvar ${pilar}</button>
        </form>
      </details>
    `;
  }).join('');

  document.querySelectorAll('.form-pilar').forEach((form) => {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await api('planejamento', {
          method: 'POST',
          body: JSON.stringify({
            cliente_id: clienteId,
            pilar: form.dataset.pilar,
            objetivo: form.objetivo.value,
            diagnostico: form.diagnostico.value,
            estrategia: form.estrategia.value,
          }),
        });
        toast(form.dataset.pilar + ' salvo');
      } catch (err) { toast(err.message); }
    });
  });
}

// --- OKRs ---
async function renderAbaOkrs(clienteId, el) {
  const { okrs } = await api('okrs?cliente_id=' + clienteId);
  el.innerHTML = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:1rem">
      <button class="btn btn-grad" onclick="toggleFormOkr('${clienteId}')">Novo OKR</button>
    </div>

      ${(!okrs || okrs.length === 0) ? `<div class="card"><p class="empty">Nenhum OKR cadastrado ainda.</p></div>` :
        okrs.map((o) => `
          <div class="card" style="margin-bottom:.75rem">
            <div style="font-size:13px;font-weight:600;color:var(--navy)">${esc(o.objetivo)}</div>
            <div class="sub" style="margin:2px 0 8px">${esc(o.resultado_chave)}</div>
            <div class="prog-row">
              <div class="prog-track"><div class="prog-fill" style="width:${o.progresso}%"></div></div>
              <input class="prog-input" type="number" min="0" max="100" value="${o.progresso}"

              <span class="sub">%</span>
            </div>
            ${o.prazo ? `<div class="sub" style="margin-top:6px">Prazo: ${new Date(o.prazo + 'T00:00:00').toLocaleDateString('pt-BR')}</div>` : ''}

        `).join('')}

function toggleFormOkr(clienteId) {
  const wrap = document.getElementById('form-okr-wrap');
  if (wrap.innerHTML.trim() !== '') { wrap.innerHTML = ''; return; }
  wrap.innerHTML = `
    <div class="card" style="margin-bottom:1rem">
      <form id="form-novo-okr">
        <div class="field"><label>Objetivo</label><input name="objetivo" required></div>
        <div class="field"><label>Resultado-chave</label><input name="resultado_chave" required></div>
        <div class="grid2">
          <div class="field"><label>Progresso inicial (%)</label><input type="number" name="progresso" min="0" max="100" value="0"></div>
          <div class="field"><label>Prazo</label><input type="date" name="prazo"></div>
        </div>
        <button class="btn btn-navy" type="submit">Salvar OKR</button>
      </form>
    </div>
  `;
  document.getElementById('form-novo-okr').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    try {
      await api('okrs', {
        method: 'POST',
        body: JSON.stringify({
          cliente_id: clienteId,
          objetivo: f.objetivo.value,
          resultado_chave: f.resultado_chave.value,
          progresso: f.progresso.value,
          prazo: f.prazo.value,
        }),
      });
      toast('OKR salvo');
      renderAba(clienteId);
    } catch (err) { toast(err.message); }
  });
}

async function atualizarOkr(id, progresso, clienteId) {
  try {
    await api('okrs?id=' + id, { method: 'PATCH', body: JSON.stringify({ progresso }) });
    toast('Progresso atualizado');
    renderAba(clienteId);
  } catch (e) { toast(e.message); }
}
