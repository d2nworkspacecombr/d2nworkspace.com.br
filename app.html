<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D2N Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* Azul-marinho como cor dominante; teal reservado como toque de destaque */
  --navy-900:#0a1628;--navy-800:#0f1f3a;--navy-700:#15305c;--navy-600:#1d3f74;
  --teal:#22d3d3;--teal-deep:#0fa8a8;--teal-soft:#e3fbfb;
  --grad-navy:linear-gradient(135deg,var(--navy-600) 0%,var(--navy-900) 100%);
  --grad-accent:linear-gradient(135deg,var(--teal) 0%,var(--navy-700) 100%);
  --ink:#0e1626;--ink-soft:#5a6478;--ink-faint:#99a2b6;
  --paper:#f5f6fa;--surface:#fff;--line:#e9ebf1;
  --shadow-sm:0 1px 2px rgba(14,22,38,.04),0 1px 1px rgba(14,22,38,.03);
  --shadow-md:0 6px 20px rgba(14,22,38,.08),0 2px 5px rgba(14,22,38,.04);
  --r-sm:8px;--r-md:12px;--r-lg:16px;
  /* compatibilidade com nomes de cor usados em outras partes do código */
  --navy:var(--navy-700);--navy-dark:var(--navy-800);--teal-dark:var(--teal-deep);--teal-light:var(--teal-soft);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Barlow',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:252px;flex-shrink:0;background:linear-gradient(195deg,var(--navy-900) 0%,#081222 100%);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;box-shadow:2px 0 24px rgba(0,0,0,.2)}
.sidebar-head{display:flex;align-items:center;gap:11px;padding:1.7rem 1.5rem 1.4rem}
.sidebar-head img{width:34px;height:34px;border-radius:9px;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.brand-word{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;letter-spacing:.04em;text-transform:uppercase;
  background:linear-gradient(120deg,var(--teal) 0%,#6fa8d8 55%,#a9b8d8 100%);-webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;color:transparent;display:block;line-height:1.1}
.sidebar-head small{display:block;font-size:9.5px;letter-spacing:.1em;color:#5b7da3;text-transform:uppercase;font-weight:600;margin-top:2px}

.nav{flex:1;padding:.6rem .9rem;overflow-y:auto}
.nav-grupo-titulo{font-family:'Sora',sans-serif;font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:#3f5a82;padding:16px 14px 7px}
.nav-grupo-titulo:first-child{padding-top:6px}
.nav a{display:flex;align-items:center;gap:11px;padding:9px 14px;margin-bottom:2px;border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:#9fb0c9;text-decoration:none;transition:background .15s,color .15s}
.nav a svg{width:16.5px;height:16.5px;flex-shrink:0;opacity:.85;transition:color .15s}
.nav a:hover{background:rgba(255,255,255,.05);color:#e3e9f3}
.nav a.active{background:var(--teal);color:var(--navy-900);font-weight:600}
.nav a.active svg{color:var(--navy-900);opacity:1}
.nav-em-breve{display:flex;align-items:center;gap:11px;padding:9px 14px;font-family:'Sora',sans-serif;font-size:13px;font-weight:500;color:#445873;cursor:default}
.nav-em-breve svg{width:16.5px;height:16.5px;flex-shrink:0;opacity:.5}
.nav-em-breve em{margin-left:auto;font-style:normal;font-size:9px;background:rgba(255,255,255,.06);color:#6b85a8;padding:2px 7px;border-radius:20px;font-weight:600;letter-spacing:.03em}
.nav-badge{margin-left:auto;font-size:9px;background:var(--teal);color:var(--navy-900);padding:2px 7px;border-radius:20px;font-weight:700;letter-spacing:.03em;display:none}

/* AGENDA — GRADE DE CALENDÁRIO (Semana com horários / Mês em grade) */
.cal-week{display:flex;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff}
.cal-hours{width:52px;flex-shrink:0;border-right:1px solid var(--line)}
.cal-hours-head{height:44px;border-bottom:1px solid var(--line)}
.cal-hora-label{font-size:10px;color:var(--ink-faint);text-align:right;padding-right:6px;box-sizing:border-box;border-bottom:1px solid var(--line);position:relative;top:-7px}
.cal-day-col{flex:1;border-right:1px solid var(--line);position:relative;min-width:0}
.cal-day-col:last-child{border-right:none}
.cal-day-head{height:44px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Sora',sans-serif;gap:2px}
.cal-day-head .dn{font-size:10px;color:var(--ink-faint);text-transform:uppercase;letter-spacing:.04em}
.cal-day-head .dd{font-size:13px;font-weight:700;color:var(--navy-700)}
.cal-day-head.hoje .dd{background:var(--teal);color:var(--navy-900);width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-day-body{position:relative}
.cal-linha-hora{border-bottom:1px solid var(--line);box-sizing:border-box}
.cal-evento{position:absolute;left:3px;right:3px;border-radius:6px;padding:3px 6px;font-size:11px;color:#fff;overflow:hidden;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.15)}
.cal-evento b{display:block;font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-evento span{font-size:10px;opacity:.85}

.cal-month{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff}
.cal-month-head{font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-faint);text-align:center;padding:8px 0;border-bottom:1px solid var(--line);background:var(--paper)}
.cal-month-cel{min-height:96px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:6px;box-sizing:border-box}
.cal-month-cel.outro-mes{background:var(--paper);opacity:.5}
.cal-month-cel .num{font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;color:var(--navy-700);margin-bottom:4px}
.cal-month-cel.hoje .num{background:var(--teal);color:var(--navy-900);width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.cal-month-evento{font-size:10px;color:#fff;border-radius:4px;padding:1px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-month-mais{font-size:10px;color:var(--ink-faint);cursor:pointer}

/* TAREFAS — layout em 3 colunas (nav / árvore / painel) */
.tf-shell{display:flex;border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;background:#fff;min-height:560px}
.tf-nav{width:208px;flex-shrink:0;background:var(--paper);border-right:1px solid var(--line);padding:1rem;overflow-y:auto}
.tf-amb-toggle{display:flex;background:#fff;border:1px solid var(--line);border-radius:9px;padding:3px;margin-bottom:1.1rem}
.tf-amb-btn{flex:1;border:none;background:none;padding:7px 0;font-family:'Sora',sans-serif;font-size:11px;font-weight:600;color:var(--ink-faint);border-radius:7px;cursor:pointer}
.tf-amb-btn.active{background:var(--navy-700);color:#fff}
.tf-nav-secao{margin-bottom:1.3rem}
.tf-nav-titulo{display:flex;justify-content:space-between;align-items:center;font-family:'Sora',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin-bottom:.5rem}
.tf-add{background:none;border:none;color:var(--teal-deep);font-size:15px;font-weight:700;cursor:pointer;line-height:1;padding:0 4px}
.tf-nav-item{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:none;border:none;padding:7px 8px;border-radius:7px;font-size:13px;color:var(--ink-soft);cursor:pointer;font-family:'Barlow',sans-serif}
.tf-nav-item:hover{background:#fff}
.tf-nav-item.active{background:var(--navy-700);color:#fff;font-weight:600}
.tf-proj-item{display:flex;flex-direction:column;gap:3px;padding:7px 8px;border-radius:7px;cursor:pointer;margin-bottom:2px}
.tf-proj-item:hover{background:#fff}
.tf-proj-item.active{background:#fff;box-shadow:inset 0 0 0 1.5px var(--teal)}
.tf-proj-nome{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink)}
.tf-proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tf-proj-barra{height:4px;border-radius:3px;background:var(--line);overflow:hidden;margin-left:15px}
.tf-proj-barra div{height:100%;background:var(--teal)}
.tf-proj-pct{font-size:10px;color:var(--ink-faint);margin-left:15px}

.tf-lista{flex:1;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--line)}
.tf-lista-head{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.25rem;border-bottom:1px solid var(--line)}
.tf-lista-head h2{font-family:'Sora',sans-serif;font-size:16px;color:var(--navy-700);margin:0}
.tf-arvore{flex:1;overflow-y:auto;padding:.6rem}

.tf-item{display:flex;align-items:flex-start;gap:9px;padding:8px 10px;border-radius:8px;cursor:pointer}
.tf-item:hover{background:var(--paper)}
.tf-item.selecionada{background:#eaf7f7}
.tf-check{width:17px;height:17px;border-radius:50%;border:1.8px solid var(--ink-faint);flex-shrink:0;margin-top:2px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;font-size:10px;color:#fff;font-weight:700}
.tf-check.feita{background:var(--teal);border-color:var(--teal)}
.tf-item-corpo{flex:1;min-width:0}
.tf-item-titulo{font-size:13.5px;color:var(--ink);line-height:1.4}
.tf-item-titulo.feita{color:var(--ink-faint);text-decoration:line-through}
.tf-item-meta{display:flex;gap:9px;align-items:center;margin-top:3px;flex-wrap:wrap}
.tf-prio{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tf-prazo{font-size:11px;color:var(--ink-faint)}
.tf-prazo.atrasada{color:#d3455a;font-weight:600}
.tf-toggle-sub{background:none;border:none;color:var(--ink-faint);cursor:pointer;padding:2px;flex-shrink:0;margin-top:1px;width:14px;font-size:11px}
.tf-filhos{margin-left:25px;border-left:1px solid var(--line);padding-left:5px}

.tf-painel{width:336px;flex-shrink:0;padding:1.25rem;overflow-y:auto}
.tf-painel-vazio{color:var(--ink-faint);font-size:13px;text-align:center;margin-top:3rem}
.tf-titulo-input{font-family:'Sora',sans-serif;font-weight:700;font-size:15px;border:none;border-bottom:1.5px solid transparent;padding:4px 0;background:transparent;width:100%;color:var(--ink)}
.tf-titulo-input:focus{border-bottom-color:var(--navy-600);outline:none}

.sidebar-foot{padding:1.1rem 1.2rem 1.3rem;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(255,255,255,.07)}
.avatar{width:33px;height:33px;border-radius:50%;background:var(--grad-accent);display:flex;align-items:center;justify-content:center;
  font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;color:#fff;flex-shrink:0;text-transform:uppercase}
.sidebar-foot .quem{flex:1;min-width:0}
.sidebar-foot .nome{font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-foot .cargo{font-size:10.5px;color:#5b7da3;text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.sidebar-foot button{background:rgba(255,255,255,.06);border:none;color:#9fb0c9;width:30px;height:30px;border-radius:var(--r-sm);
  cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,color .15s}
.sidebar-foot button:hover{background:rgba(255,255,255,.12);color:#fff}
.sidebar-foot button svg{width:14.5px;height:14.5px}

/* MAIN */
.main{flex:1;margin-left:252px;padding:3rem 3.5rem}
.eyebrow{font-family:'Sora',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--teal-deep);margin-bottom:.55rem}
h1{font-family:'Sora',sans-serif;font-size:27px;font-weight:700;color:var(--navy-700);letter-spacing:-.012em;margin-bottom:.3rem}
.sub{font-size:12.5px;color:var(--ink-faint)}

/* BOTÕES */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border:none;border-radius:var(--r-sm);font-family:'Sora',sans-serif;
  font-size:12.5px;font-weight:600;letter-spacing:0;cursor:pointer;transition:transform .12s,box-shadow .15s,opacity .15s}
.btn-grad{background:var(--grad-navy);color:#fff;box-shadow:0 2px 10px rgba(10,22,40,.22)}
.btn-grad:hover{box-shadow:0 5px 16px rgba(10,22,40,.32);transform:translateY(-1px)}
.btn-navy{background:var(--navy-700);color:#fff}
.btn-navy:hover{background:var(--navy-800)}
.btn-outline{background:transparent;border:1.5px solid var(--line);color:var(--navy-700)}
.btn-outline:hover{border-color:var(--navy-600)}
.btn:disabled{opacity:.5;cursor:default;transform:none}

/* CARDS / TABELA */
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r-lg);padding:1.6rem;box-shadow:var(--shadow-sm)}
.empty{text-align:center;padding:3.2rem;color:var(--ink-faint);font-size:13px;line-height:1.7}
table{width:100%;border-collapse:collapse}
th{font-family:'Sora',sans-serif;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:600;text-align:left;padding:12px 16px;border-bottom:1px solid var(--line)}
td{padding:14px 16px;font-size:13.5px;border-bottom:1px solid var(--line)}
tr.linha{transition:background .12s}
tr.linha:hover td{background:var(--paper);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:6px;padding:3px 10px 3px 8px;border-radius:20px;font-family:'Sora',sans-serif;
  font-size:10.5px;font-weight:600;letter-spacing:.02em;background:var(--paper);color:var(--navy-700);border:1px solid var(--line)}
.pill::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--teal)}
.link{color:var(--navy-700);font-weight:600;text-decoration:none}
.link:hover{color:var(--teal-deep)}

/* FORM */
.field{margin-bottom:1.05rem}
.field label{display:block;font-family:'Sora',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:var(--r-sm);font-family:'Barlow',sans-serif;font-size:14px;background:var(--paper);outline:none;transition:border-color .15s,background .15s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--navy-600);background:#fff}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.checks{display:flex;flex-wrap:wrap;gap:14px;font-size:12.5px;color:var(--ink-soft)}

/* TABS */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:1.6rem}
.tab{padding:10px 16px;font-family:'Sora',sans-serif;font-size:12px;font-weight:600;color:var(--ink-faint);border:none;border-bottom:2px solid transparent;background:none;cursor:pointer;margin-bottom:-1px;transition:color .15s}
.tab.active{color:var(--navy-700);border-bottom-color:var(--teal)}

/* PROGRESS */
.prog-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.prog-track{flex:1;height:6px;background:var(--paper);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--grad-accent)}
.prog-input{width:58px;padding:5px 8px;border:1px solid var(--line);border-radius:6px;font-size:12px;font-family:'Sora',sans-serif}

.toast{position:fixed;bottom:26px;right:26px;background:var(--navy-800);color:#fff;padding:13px 22px;border-radius:var(--r-sm);
  font-family:'Sora',sans-serif;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.22);display:none;z-index:999}

/* CARREGAMENTO — spinner elegante reutilizado em todas as telas */
.loading-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:3.6rem 1rem}
.loading-spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--line);border-top-color:var(--teal);animation:d2n-spin .8s linear infinite}
.loading-wrap span{font-family:'Sora',sans-serif;font-size:11.5px;font-weight:600;letter-spacing:.04em;color:var(--ink-faint);animation:d2n-pulse 1.6s ease-in-out infinite}
@keyframes d2n-spin{to{transform:rotate(360deg)}}
@keyframes d2n-pulse{0%,100%{opacity:.5}50%{opacity:1}}
.hidden{display:none !important}

/* RESPONSIVO — telas estreitas viram menu retrátil */
.mobile-bar{display:none}
.backdrop-mobile{display:none}
@media (max-width: 880px){
  .mobile-bar{display:flex;align-items:center;gap:12px;height:54px;padding:0 1.2rem;background:#fff;border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:60}
  .mobile-bar button{background:var(--paper);border:none;width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
    justify-content:center;cursor:pointer;color:var(--navy-700);flex-shrink:0}
  .mobile-bar button svg{width:18px;height:18px}
  .mobile-bar img{width:26px;height:26px;border-radius:6px}
  .sidebar{transform:translateX(-100%);transition:transform .2s ease;z-index:1100}
  .sidebar.aberta{transform:translateX(0)}
  .main{margin-left:0;padding:1.5rem 1.2rem;max-width:100%}
  .backdrop-mobile.show{display:block;position:fixed;inset:0;background:rgba(8,16,30,.45);z-index:1050}
  table{min-width:560px}
  .card{overflow-x:auto}
}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(8,16,30,.6);backdrop-filter:blur(2px);display:flex;align-items:center;
  justify-content:center;z-index:1000;padding:1.5rem;animation:fadeIn .15s ease}
.modal-card{background:#fff;border-radius:18px;max-width:580px;width:100%;max-height:88vh;overflow-y:auto;
  box-shadow:0 28px 64px rgba(8,16,30,.4);animation:slideUp .18s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-head{display:flex;justify-content:space-between;align-items:flex-start;padding:1.6rem 1.7rem 0}
.modal-head .eyebrow{margin-bottom:.3rem}
.modal-head h2{font-family:'Sora',sans-serif;font-size:19px;font-weight:700;color:var(--navy-700);letter-spacing:-.01em}
.modal-head .modal-sub{font-size:12px;color:var(--ink-faint);margin-top:2px}
.modal-close{background:var(--paper);border:none;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;color:var(--ink-soft);flex-shrink:0;transition:background .15s}
.modal-close:hover{background:var(--line)}
.modal-close svg{width:15px;height:15px}
.modal-body{padding:1.4rem 1.7rem 1.8rem}

/* MULTI-SELECT COM CHIPS */
.multi-select{border:1.5px solid var(--line);border-radius:var(--r-sm);padding:9px 10px;position:relative;background:var(--paper)}
.multi-select.foco{border-color:var(--navy-600);background:#fff}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px}
.chips:empty{margin-bottom:0}
.chip{display:flex;align-items:center;gap:6px;background:var(--teal-soft);color:var(--navy-700);font-family:'Sora',sans-serif;
  font-size:11.5px;font-weight:600;padding:5px 6px 5px 11px;border-radius:20px}
.chip button{background:rgba(21,48,92,.12);border:none;color:var(--navy-700);cursor:pointer;width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:12px;line-height:1;padding:0}
.multi-select input{border:none;background:transparent;width:100%;font-family:'Barlow',sans-serif;font-size:13.5px;padding:3px 2px;outline:none}
.multi-dropdown{position:absolute;left:0;right:0;top:calc(100% + 4px);background:#fff;border:1px solid var(--line);border-radius:10px;
  max-height:190px;overflow-y:auto;box-shadow:var(--shadow-md);z-index:10;display:none}
.multi-dropdown.show{display:block}
.multi-dropdown .opcao{padding:9px 13px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:8px}
.multi-dropdown .opcao:hover{background:var(--paper)}
.multi-dropdown .opcao-vazia{padding:12px 13px;font-size:12.5px;color:var(--ink-faint)}

/* BUSCA */
.busca-wrap{position:relative;margin-bottom:1.1rem;max-width:340px}

      </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

  <div class="modal-card" id="modal-card"></div>
</div>

  <button class="ae-preview-close" onclick="document.getElementById('ae-preview').classList.remove('open')">✕</button>

<script>
// ============================================================================
// CONFIG / AUTENTICAÇÃO
// ============================================================================
let tokenAtual = localStorage.getItem('d2n_token');
const usuario = JSON.parse(localStorage.getItem('d2n_usuario') || 'null');

if (!tokenAtual || !usuario) {
  // Limpa qualquer "crachá" inválido antes de voltar pro login,
  // pra nunca ficar num loop entre as duas páginas.
  localStorage.removeItem('d2n_token');
  localStorage.removeItem('d2n_refresh');
  localStorage.removeItem('d2n_usuario');
  window.location.href = 'index.html';
}

document.getElementById('nome-usuario').textContent = usuario?.nome || '';
document.getElementById('cargo-usuario').textContent =
  usuario?.role === 'admin' ? 'Administrador' : (usuario?.cargo || 'Colaborador');
document.getElementById('avatar-usuario').textContent =
  (usuario?.nome || '').trim().split(/\s+/).slice(0, 2).map((p) => p[0]).join('');

function sair() {
  localStorage.removeItem('d2n_token');
  localStorage.removeItem('d2n_refresh');
  localStorage.removeItem('d2n_usuario');
  window.location.href = 'index.html';
}

function toggleMenuMobile() {
  document.getElementById('sidebar').classList.toggle('aberta');
  document.getElementById('backdrop-mobile').classList.toggle('show');
}

// Quando o token expira (normal, depois de um tempo logado), pede um novo
// usando o "refresh_token" guardado — sem precisar fazer login de novo.
async function renovarSessao() {
  try {
    const refresh_token = localStorage.getItem('d2n_refresh');
    if (!refresh_token) return false;

    const resp = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ acao: 'refresh', refresh_token }),
    });
    if (!resp.ok) return false;

    const data = await resp.json();
    tokenAtual = data.access_token;
    localStorage.setItem('d2n_token', data.access_token);
    localStorage.setItem('d2n_refresh', data.refresh_token);
    return true;
  } catch (e) {
    return false;
  }
}

// Chamada padrão pra qualquer endpoint da API, já com o token incluído.
// Se o token tiver expirado, renova sozinho e tenta de novo uma vez.
async function api(path, options = {}, _tentativaRenovada = false) {
  const resp = await fetch('/api/' + path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      Authorization: 'Bearer ' + tokenAtual,
      ...(options.headers || {}),
    },
  });

  const tokenExpirou = resp.status === 401 ||
    (!resp.ok && (await resp.clone().json().catch(() => ({}))).erro?.toLowerCase().includes('jwt'));

  if (tokenExpirou && !_tentativaRenovada) {
    const renovou = await renovarSessao();
    if (renovou) return api(path, options, true);
    sair();
    return null;
  }

  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.erro || 'Erro inesperado');
  return data;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.display = 'block';
  setTimeout(() => (el.style.display = 'none'), 2500);
}

// ============================================================================
// CARREGAMENTO — componente reutilizável (spinner teal + texto pulsante)
// ============================================================================
function htmlCarregando(msg) {
  return `
    <div class="loading-wrap">
      <div class="loading-spinner"></div>
      <span>${esc(msg || 'Carregando...')}</span>
    </div>
  `;
}

// Cache simples em memória: mostra o que já foi carregado antes na hora,
// enquanto busca por trás uma versão atualizada. Some quando a página recarrega.
const _cacheListas = {};

// ============================================================================
// MODAL — abre um card elegante centralizado, com cabeçalho padronizado
// ============================================================================
function abrirModal({ eyebrow, titulo, subtitulo, corpoHtml }) {
  document.getElementById('modal-card').innerHTML = `
    <div class="modal-head">
      <div>
        ${eyebrow ? `<div class="eyebrow">${esc(eyebrow)}</div>` : ''}
        <h2>${esc(titulo)}</h2>
        ${subtitulo ? `<div class="modal-sub">${esc(subtitulo)}</div>` : ''}
      </div>
      <button class="modal-close" onclick="fecharModal()" aria-label="Fechar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">${corpoHtml}</div>
  `;
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function fecharModal() {
  document.getElementById('modal-overlay').classList.add('hidden');
  document.getElementById('modal-card').innerHTML = '';
}

// ============================================================================
// SELETOR COM CHIPS — busca + seleciona itens de uma lista, mostrando
// "pílulas" removíveis em vez de uma grade de checkboxes.
// ============================================================================
function montarMultiSelect({ containerId, opcoes, selecionadosIniciais = [] }) {
  const container = document.getElementById(containerId);
  const selecionados = new Set(selecionadosIniciais);

  function opcaoPorId(id) {
    return opcoes.find((o) => o.id === id);
  }

  function renderChips() {
    const chipsEl = container.querySelector('.chips');
    chipsEl.innerHTML = [...selecionados].map((id) => {
      const o = opcaoPorId(id);
      return `<span class="chip">${esc(o ? o.label : id)}<button type="button" data-remover="${id}">&times;</button></span>`;
    }).join('');
    chipsEl.querySelectorAll('[data-remover]').forEach((btn) => {
      btn.addEventListener('click', () => {
        selecionados.delete(btn.dataset.remover);
        renderChips();
      });
    });
  }

  function renderDropdown(filtro) {
    const dropdown = container.querySelector('.multi-dropdown');
    const disponiveis = opcoes.filter((o) =>
      !selecionados.has(o.id) && o.label.toLowerCase().includes(filtro.toLowerCase())
    );
    if (disponiveis.length === 0) {
      dropdown.innerHTML = `<div class="opcao-vazia">Nenhum resultado</div>`;
    } else {
      dropdown.innerHTML = disponiveis.map((o) =>
        `<div class="opcao" data-id="${o.id}">${esc(o.label)}</div>`
      ).join('');
      dropdown.querySelectorAll('.opcao').forEach((el) => {
        el.addEventListener('click', () => {
          selecionados.add(el.dataset.id);
          input.value = '';
          renderChips();
          renderDropdown('');
          input.focus();
        });
      });
    }
  }

  const input = container.querySelector('input');
  const dropdown = container.querySelector('.multi-dropdown');

  input.addEventListener('focus', () => {
    container.classList.add('foco');
    dropdown.classList.add('show');
    renderDropdown(input.value);
  });
  input.addEventListener('input', () => renderDropdown(input.value));
  input.addEventListener('blur', () => {
    setTimeout(() => {
      container.classList.remove('foco');
      dropdown.classList.remove('show');
    }, 150);
  });

  renderChips();

  return { getSelecionados: () => [...selecionados] };
}

function esc(s) {
  return (s ?? '').toString().replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

let _agendaModo = 'semana';
let _agendaRef = new Date();

function agendaIntervaloSemana(data) {
  const d = new Date(data);
  const diaSemana = d.getDay(); // 0 = domingo
  const inicio = new Date(d); inicio.setDate(d.getDate() - diaSemana); inicio.setHours(0, 0, 0, 0);
  const fim = new Date(inicio); fim.setDate(inicio.getDate() + 6); fim.setHours(23, 59, 59, 999);
  return { inicio, fim };
}

function agendaIntervaloMes(data) {
  const primeiroDiaMes = new Date(data.getFullYear(), data.getMonth(), 1);
  const inicio = new Date(primeiroDiaMes);
  inicio.setDate(primeiroDiaMes.getDate() - primeiroDiaMes.getDay()); // domingo da primeira semana visível
  inicio.setHours(0, 0, 0, 0);
  const fim = new Date(inicio);
  fim.setDate(inicio.getDate() + 41); // grade de 6 semanas = 42 dias
  fim.setHours(23, 59, 59, 999);
  return { inicio, fim };
}

function formatarPeriodoAgenda(inicio, fim) {
  const opts = { day: '2-digit', month: 'short' };
  return inicio.toLocaleDateString('pt-BR', opts) + ' — ' + fim.toLocaleDateString('pt-BR', opts);
}

  await carregarAgenda();

function agendaTrocarModo(modo) {
  _agendaModo = modo;
  viewAgendaLista();
}

function agendaNavegar(direcao) {
  const ref = new Date(_agendaRef);
  if (_agendaModo === 'semana') ref.setDate(ref.getDate() + direcao * 7);
  else ref.setMonth(ref.getMonth() + direcao);
  _agendaRef = ref;
  viewAgendaLista();
}

let _agendaCache = [];

async function carregarAgenda() {
  const { inicio, fim } = _agendaModo === 'semana' ? agendaIntervaloSemana(_agendaRef) : agendaIntervaloMes(_agendaRef);
  document.getElementById('agenda-periodo-label').textContent = formatarPeriodoAgenda(inicio, fim);

  try {
    const { compromissos } = await api('agenda?inicio=' + inicio.toISOString() + '&fim=' + fim.toISOString());
    _agendaCache = compromissos || [];
    if (_agendaModo === 'semana') {
      renderAgendaSemanaGrade(_agendaCache, inicio);
    } else {
      renderAgendaMesGrade(_agendaCache, inicio, _agendaRef);
    }
    atualizarBadgeAgenda(_agendaCache);
  } catch (e) {
    document.getElementById('agenda-lista').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}

const AGENDA_HORA_INICIO = 6, AGENDA_HORA_FIM = 22, AGENDA_ALTURA_HORA = 48;

function renderAgendaSemanaGrade(compromissos, inicioSemana) {
  const el = document.getElementById('agenda-lista');
  const dias = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(inicioSemana);
    d.setDate(inicioSemana.getDate() + i);
    dias.push(d);
  }
  const hoje = new Date();
  const horas = [];
  for (let h = AGENDA_HORA_INICIO; h < AGENDA_HORA_FIM; h++) horas.push(h);
  const alturaTotal = horas.length * AGENDA_ALTURA_HORA;

  el.innerHTML = `
    <div class="cal-week">
      <div class="cal-hours">
        <div class="cal-hours-head"></div>
        ${horas.map((h) => `<div class="cal-hora-label" style="height:${AGENDA_ALTURA_HORA}px">${String(h).padStart(2, '0')}:00</div>`).join('')}
      </div>
      ${dias.map((d) => {
        const ehHoje = d.toDateString() === hoje.toDateString();
        const eventosDoDia = compromissos.filter((c) => new Date(c.data_inicio).toDateString() === d.toDateString());
        return `
          <div class="cal-day-col">
            <div class="cal-day-head ${ehHoje ? 'hoje' : ''}">
              <span class="dn">${d.toLocaleDateString('pt-BR', { weekday: 'short' }).replace('.', '')}</span>
              <span class="dd">${d.getDate()}</span>
            </div>
            <div class="cal-day-body" style="height:${alturaTotal}px">
              ${horas.map(() => `<div class="cal-linha-hora" style="height:${AGENDA_ALTURA_HORA}px"></div>`).join('')}
              ${eventosDoDia.map((c) => htmlEventoGrade(c)).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function htmlEventoGrade(c) {
  const inicioEv = new Date(c.data_inicio);
  const horaDecimal = inicioEv.getHours() + inicioEv.getMinutes() / 60;
  const fimEv = c.data_fim ? new Date(c.data_fim) : new Date(inicioEv.getTime() + 60 * 60000);
  const duracaoHoras = Math.max(0.5, (fimEv - inicioEv) / 3600000);
  const top = Math.max(0, (horaDecimal - AGENDA_HORA_INICIO) * AGENDA_ALTURA_HORA);
  const altura = duracaoHoras * AGENDA_ALTURA_HORA;
  const hora = inicioEv.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return `
    <div class="cal-evento" style="top:${top}px;height:${altura}px;background:${esc(c.cor || '#22d3d3')}" onclick="abrirDetalheCompromisso('${c.id}')">
      <b>${esc(c.titulo)}</b><span>${hora}</span>
    </div>
  `;
}

function renderAgendaMesGrade(compromissos, inicioGrade, refMes) {
  const el = document.getElementById('agenda-lista');
  const mes = refMes.getMonth();
  const hoje = new Date();
  const nomesDias = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

  const dias = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(inicioGrade);
    d.setDate(inicioGrade.getDate() + i);
    dias.push(d);
  }

  el.innerHTML = `
    <div class="cal-month">
      ${nomesDias.map((n) => `<div class="cal-month-head">${n}</div>`).join('')}
      ${dias.map((d) => {
        const ehMesAtual = d.getMonth() === mes;
        const ehHoje = d.toDateString() === hoje.toDateString();
        const eventosDoDia = compromissos.filter((c) => new Date(c.data_inicio).toDateString() === d.toDateString());
        const visiveis = eventosDoDia.slice(0, 3);
        const resto = eventosDoDia.length - visiveis.length;
        return `
          <div class="cal-month-cel ${ehMesAtual ? '' : 'outro-mes'} ${ehHoje ? 'hoje' : ''}">
            <div class="num">${d.getDate()}</div>
            ${visiveis.map((c) => `<div class="cal-month-evento" style="background:${esc(c.cor || '#22d3d3')}" onclick="abrirDetalheCompromisso('${c.id}')">${esc(c.titulo)}</div>`).join('')}
            ${resto > 0 ? `<div class="cal-month-mais">+${resto} mais</div>` : ''}
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function htmlCompromisso(c) {
  const meuConvite = (c.compromisso_convidado || []).find((cv) => cv.usuario_id === usuario.id);
  const pendente = meuConvite && meuConvite.status === 'pendente';

  return `
    <div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:8px;${pendente ? 'border-left:3px solid #c2820f' : ''}">

      ` : meuConvite ? `<span class="pill">${meuConvite.status === 'aceito' ? 'Aceito' : 'Recusado'}</span>` : ''}

  `;
}

        ${c.compromisso_convidado.map((cv) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)">
            <span style="font-size:13px;color:var(--ink-soft)">${esc(cv.usuarios?.nome || '—')}</span>
            <span class="pill" style="${cv.status === 'pendente' ? 'opacity:.55' : ''}">${esc(cv.status)}</span>
          </div>
        `).join('')}
      ` : ''}
      ${pendente ? `
        <div style="display:flex;gap:10px;margin-top:1.25rem">
          <button class="btn btn-outline" style="flex:1" onclick="responderConvite('${c.id}','recusado')">Recusar</button>
          <button class="btn btn-grad" style="flex:1" onclick="responderConvite('${c.id}','aceito')">Aceitar</button>
        </div>
      ` : ''}
    `,
  });
}

async function responderConvite(compromissoId, status) {
  try {
    await api('agenda?id=' + compromissoId + '&acao=responder', { method: 'PATCH', body: JSON.stringify({ status }) });
    toast(status === 'aceito' ? 'Compromisso aceito' : 'Compromisso recusado');
    fecharModal();
    rotear();
  } catch (e) { toast(e.message); }
}

function atualizarBadgeAgenda(compromissos) {
  const pendentes = (compromissos || []).filter((c) =>
    (c.compromisso_convidado || []).some((cv) => cv.usuario_id === usuario.id && cv.status === 'pendente')
  ).length;

  const link = document.querySelector('.nav a[href="#/agenda"]');
  if (!link) return;
  let badge = link.querySelector('.nav-badge');
  if (!badge) {
    badge = document.createElement('span');
    badge.className = 'nav-badge';
    link.appendChild(badge);
  }
  if (pendentes > 0) {
    badge.textContent = pendentes;
    badge.style.display = 'inline-flex';
  } else {
    badge.style.display = 'none';
  }
}

// ============================================================================
// VIEW: TAREFAS — layout em 3 colunas (nav / árvore / painel da tarefa)
// ============================================================================
let _tfAmbiente = 'privado';
let _tfVisao = 'inbox';
let _tfProjetoId = null;
let _tfCategoriaSelecionada = null;
let _tfProjetos = [];
let _tfCategorias = [];
let _tfEtiquetas = [];
let _tfTarefas = [];
let _tfTarefaSelecionada = null;
let _tfSeletorResponsaveis = null;
let _tfExpandido = {};

const TF_VISOES = [
  { id: 'inbox', label: 'Inbox' },
  { id: 'hoje', label: 'Hoje' },
  { id: 'semana', label: 'Próximos 7 dias' },
  { id: 'atrasadas', label: 'Atrasadas' },
  { id: 'concluidas', label: 'Concluídas' },
];
const TF_CORES_PRIORIDADE = { baixa: '#8aa0bd', media: '#22d3d3', alta: '#c2820f', urgente: '#d3455a' };

async function viewTarefasLista() {
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Geral</div>
    <h1>Tarefas</h1>
    <div class="tf-shell" style="margin-top:1.25rem">
      <nav class="tf-nav" id="tf-nav"></nav>
      <div class="tf-lista">
        <div class="tf-lista-head">
          <h2 id="tf-titulo-visao">Inbox</h2>
          <button class="btn btn-grad" onclick="tfNovaTarefa()">+ Nova tarefa</button>
        </div>
        <div class="tf-arvore" id="tf-arvore">${htmlCarregando()}</div>
      </div>
      <div class="tf-painel" id="tf-painel"><p class="tf-painel-vazio">Selecione uma tarefa para ver os detalhes.</p></div>
    </div>
  `;

  try {
    const [{ projetos }, { categorias }, { etiquetas }] = await Promise.all([
      api('projetos'), api('categorias'), api('etiquetas'),
    ]);
    _tfProjetos = projetos || [];
    _tfCategorias = categorias || [];
    _tfEtiquetas = etiquetas || [];
  } catch (e) { toast(e.message); }

  renderTfNav();
  tfTrocarVisao('inbox');
}

function renderTfNav() {
  document.getElementById('tf-nav').innerHTML = `
    <div class="tf-amb-toggle">
      <button class="tf-amb-btn ${_tfAmbiente === 'privado' ? 'active' : ''}" onclick="tfTrocarAmbiente('privado')">Minhas Tarefas</button>
      <button class="tf-amb-btn ${_tfAmbiente === 'empresa' ? 'active' : ''}" onclick="tfTrocarAmbiente('empresa')">Empresa</button>
    </div>
    <div class="tf-nav-secao">
      <div class="tf-nav-titulo">Visualizações</div>
      ${TF_VISOES.map((v) => `
        <button class="tf-nav-item ${(_tfVisao === v.id && !_tfProjetoId) ? 'active' : ''}" onclick="tfTrocarVisao('${v.id}')">${v.label}</button>
      `).join('')}
    </div>
    <div class="tf-nav-secao">
      <div class="tf-nav-titulo">Projetos <button class="tf-add" onclick="tfNovoProjeto()" title="Novo projeto">+</button></div>
      ${_tfProjetos.length === 0 ? `<p class="sub" style="font-size:12px">Nenhum projeto ainda.</p>` : _tfProjetos.map((p) => `
        <div class="tf-proj-item ${_tfProjetoId === p.id ? 'active' : ''}" onclick="tfAbrirProjeto('${p.id}')">
          <div class="tf-proj-nome"><span class="tf-proj-dot" style="background:${esc(p.cor)}"></span>${esc(p.nome)}</div>
          <div class="tf-proj-barra"><div style="width:${p.progresso}%"></div></div>
          <div class="tf-proj-pct">${p.progresso}% · ${p.tarefas_concluidas}/${p.total_tarefas}</div>
        </div>
      `).join('')}
    </div>
    <div class="tf-nav-secao">
      <div class="tf-nav-titulo">Categorias <button class="tf-add" onclick="tfNovaCategoria()" title="Nova categoria">+</button></div>
      ${_tfCategorias.length === 0 ? `<p class="sub" style="font-size:12px">Nenhuma categoria ainda.</p>` : _tfCategorias.map((c) => `
        <button class="tf-nav-item ${_tfCategoriaSelecionada === c.id ? 'active' : ''}" onclick="tfFiltrarCategoria('${c.id}')">${esc(c.nome)}</button>
      `).join('')}
    </div>
  `;
}

function tfTrocarAmbiente(amb) {
  _tfAmbiente = amb;
  _tfProjetoId = null;
  tfTrocarVisao(_tfVisao);
}

function tfTrocarVisao(visao) {
  _tfVisao = visao;
  _tfProjetoId = null;
  renderTfNav();
  const v = TF_VISOES.find((x) => x.id === visao);
  document.getElementById('tf-titulo-visao').textContent = v ? v.label : visao;
  tfCarregarArvore();
}

function tfAbrirProjeto(id) {
  _tfProjetoId = id;
  renderTfNav();
  const p = _tfProjetos.find((x) => x.id === id);
  document.getElementById('tf-titulo-visao').textContent = p ? p.nome : 'Projeto';
  tfCarregarArvore();
}

function tfFiltrarCategoria(id) {
  _tfCategoriaSelecionada = _tfCategoriaSelecionada === id ? null : id;
  renderTfNav();
  tfCarregarArvore();
}

async function tfCarregarArvore() {
  const el = document.getElementById('tf-arvore');
  el.innerHTML = htmlCarregando();

  let url = 'tarefas?';
  url += _tfProjetoId ? 'projeto_id=' + _tfProjetoId : 'ambiente=' + _tfAmbiente + '&visao=' + _tfVisao;
  if (_tfCategoriaSelecionada) url += '&categoria_id=' + _tfCategoriaSelecionada;

  try {
    const { tarefas } = await api(url);
    _tfTarefas = tarefas || [];
    renderTfArvore();
  } catch (e) {
    el.innerHTML = `<p class="empty">${esc(e.message)}</p>`;
  }
}

function tfFilhos(id) {
  return _tfTarefas.filter((t) => t.tarefa_pai_id === id);
}

function renderTfArvore() {
  const el = document.getElementById('tf-arvore');
  if (_tfTarefas.length === 0) {
    el.innerHTML = `<p class="empty" style="margin-top:2rem">Nenhuma tarefa aqui.</p>`;
    return;
  }
  const itens = _tfProjetoId ? _tfTarefas.filter((t) => !t.tarefa_pai_id) : _tfTarefas;
  el.innerHTML = itens.map((t) => htmlTfItem(t, !!_tfProjetoId)).join('');
}

function htmlTfItem(t, permiteFilhos) {
  const filhos = permiteFilhos ? tfFilhos(t.id) : [];
  const temFilhos = filhos.length > 0;
  const feita = t.status === 'concluida';
  const expandido = _tfExpandido[t.id];
  const hoje = new Date().toISOString().slice(0, 10);
  const atrasada = t.prazo && t.prazo < hoje && !feita;
  const corPrio = TF_CORES_PRIORIDADE[t.prioridade] || '#22d3d3';

  return `
    <div>
      <div class="tf-item ${_tfTarefaSelecionada === t.id ? 'selecionada' : ''}" onclick="tfSelecionar('${t.id}')">
        ${temFilhos ? `<button class="tf-toggle-sub" onclick="event.stopPropagation();tfToggleExpandir('${t.id}')">${expandido ? '▾' : '▸'}</button>` : '<span style="width:14px;display:inline-block"></span>'}
        <span class="tf-check ${feita ? 'feita' : ''}" onclick="event.stopPropagation();tfConcluir('${t.id}', ${!feita})">${feita ? '✓' : ''}</span>
        <div class="tf-item-corpo">
          <div class="tf-item-titulo ${feita ? 'feita' : ''}">${esc(t.titulo)}</div>
          <div class="tf-item-meta">
            <span class="tf-prio" style="background:${corPrio}" title="Prioridade ${esc(t.prioridade)}"></span>
            ${t.prazo ? `<span class="tf-prazo ${atrasada ? 'atrasada' : ''}">${formatarDataBR(t.prazo)}</span>` : ''}
            ${t.projeto ? `<span class="tf-prazo">${esc(t.projeto.nome)}</span>` : ''}
          </div>
        </div>
      </div>
      ${temFilhos && expandido ? `<div class="tf-filhos">${filhos.map((f) => htmlTfItem(f, true)).join('')}</div>` : ''}
    </div>
  `;
}

function formatarDataBR(iso) {
  const [, m, d] = iso.split('-');
  return `${d}/${m}`;
}

function tfToggleExpandir(id) {
  _tfExpandido[id] = !_tfExpandido[id];
  renderTfArvore();
}

async function tfAtualizarProgressoProjetos() {
  try {
    const { projetos } = await api('projetos');
    _tfProjetos = projetos || [];
    renderTfNav();
  } catch (e) { /* silencioso */ }
}

async function tfConcluir(id, concluir) {
  try {
    await api('tarefas?id=' + id, { method: 'PATCH', body: JSON.stringify({ status: concluir ? 'concluida' : 'pendente' }) });
    tfCarregarArvore();
    tfAtualizarProgressoProjetos();
  } catch (e) { toast(e.message); }
}

async function tfSelecionar(id) {
  _tfTarefaSelecionada = id;
  renderTfArvore();
  const t = _tfTarefas.find((x) => x.id === id);
  if (!t) return;

  let colaboradores = [];
  try { ({ colaboradores } = await api('colaboradores')); } catch (e) { /* segue sem a lista */ }

  const etiquetasSelecionadas = (t.tarefa_etiqueta || []).map((te) => te.etiqueta_id);

  document.getElementById('tf-painel').innerHTML = `
    <input class="tf-titulo-input" value="${esc(t.titulo)}" onchange="tfSalvarCampo('titulo', this.value)">
    <div class="field" style="margin-top:.8rem">
      <label>Descrição</label>
      <textarea rows="4" onchange="tfSalvarCampo('descricao', this.value)">${esc(t.descricao || '')}</textarea>
    </div>
    <div class="grid2">
      <div class="field">
        <label>Prioridade</label>
        <select onchange="tfSalvarCampo('prioridade', this.value)">
          ${['baixa', 'media', 'alta', 'urgente'].map((p) => `<option value="${p}" ${t.prioridade === p ? 'selected' : ''}>${p}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Prazo</label>
        <input type="date" value="${t.prazo || ''}" onchange="tfSalvarCampo('prazo', this.value)">
      </div>
    </div>
    <div class="field">
      <label>Status</label>
      <select onchange="tfSalvarCampo('status', this.value)">
        ${[['pendente', 'Pendente'], ['em_andamento', 'Em andamento'], ['concluida', 'Concluída']].map(([v, l]) => `<option value="${v}" ${t.status === v ? 'selected' : ''}>${l}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Projeto</label>
      <select onchange="tfSalvarCampo('projeto_id', this.value || null)">
        <option value="">— Sem projeto —</option>
        ${_tfProjetos.map((p) => `<option value="${p.id}" ${t.projeto_id === p.id ? 'selected' : ''}>${esc(p.nome)}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Categoria</label>
      <select onchange="tfSalvarCampo('categoria_id', this.value || null)">
        <option value="">— Sem categoria —</option>
        ${_tfCategorias.map((c) => `<option value="${c.id}" ${t.categoria_id === c.id ? 'selected' : ''}>${esc(c.nome)}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>Responsáveis</label>
      <div class="multi-select" id="tf-multi-responsaveis">
        <div class="chips"></div>
        <input type="text" placeholder="Buscar colaborador...">
        <div class="multi-dropdown"></div>
      </div>
      <button type="button" style="background:none;border:none;color:var(--teal-deep);font-size:11.5px;cursor:pointer;margin-top:6px;padding:0" onclick="tfSalvarResponsaveis()">Salvar responsáveis</button>
    </div>
    <div class="field">
      <label>Etiquetas</label>
      <div class="checks" id="tf-p-etiquetas">
        ${_tfEtiquetas.map((e) => `
          <label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12.5px">
            <input type="checkbox" value="${e.id}" ${etiquetasSelecionadas.includes(e.id) ? 'checked' : ''} onchange="tfSalvarEtiquetas()">${esc(e.nome)}
          </label>
        `).join('')}
      </div>
      <button type="button" style="background:none;border:none;color:var(--teal-deep);font-size:11.5px;cursor:pointer;margin-top:6px;padding:0" onclick="tfNovaEtiquetaInline()">+ nova etiqueta</button>
    </div>
    ${t.nivel < 3 ? `<button class="btn btn-outline" style="width:100%;margin-top:.8rem" onclick="tfNovaSubtarefa('${t.id}')">+ Adicionar subtarefa</button>` : ''}
    <button class="btn btn-outline" style="width:100%;margin-top:.5rem" onclick="tfAbrirMoverPara('${t.id}')">Mover para...</button>
    <button class="btn btn-outline" style="width:100%;margin-top:.5rem;color:#d3455a;border-color:#d3455a" onclick="tfExcluir('${t.id}')">Excluir tarefa</button>
  `;

  const idsAtuais = (t.tarefa_responsavel || []).map((tr) => tr.usuario_id);
  _tfSeletorResponsaveis = montarMultiSelect({
    containerId: 'tf-multi-responsaveis',
    opcoes: colaboradores.map((c) => ({ id: c.id, label: c.nome })),
    selecionadosIniciais: idsAtuais,
  });
}

async function tfSalvarResponsaveis() {
  if (!_tfTarefaSelecionada || !_tfSeletorResponsaveis) return;
  try {
    await api('tarefas?id=' + _tfTarefaSelecionada, {
      method: 'PATCH',
      body: JSON.stringify({ responsavel_ids: _tfSeletorResponsaveis.getSelecionados() }),
    });
    toast('Responsáveis atualizados');
    tfCarregarArvore();
  } catch (e) { toast(e.message); }
}

async function tfSalvarCampo(campo, valor) {
  if (!_tfTarefaSelecionada) return;
  try {
    await api('tarefas?id=' + _tfTarefaSelecionada, { method: 'PATCH', body: JSON.stringify({ [campo]: valor }) });
    toast('Salvo');
    tfCarregarArvore();
    if (campo === 'status' || campo === 'projeto_id') tfAtualizarProgressoProjetos();
  } catch (e) { toast(e.message); }
}

async function tfSalvarEtiquetas() {
  const marcados = [...document.querySelectorAll('#tf-p-etiquetas input:checked')].map((i) => i.value);
  try {
    await api('tarefas?id=' + _tfTarefaSelecionada, { method: 'PATCH', body: JSON.stringify({ etiqueta_ids: marcados }) });
    tfCarregarArvore();
  } catch (e) { toast(e.message); }
}

async function tfNovaEtiquetaInline() {
  const nome = prompt('Nome da nova etiqueta:');
  if (!nome) return;
  try {
    await api('etiquetas', { method: 'POST', body: JSON.stringify({ nome }) });
    const { etiquetas } = await api('etiquetas');
    _tfEtiquetas = etiquetas || [];
    tfSelecionar(_tfTarefaSelecionada);
  } catch (e) { toast(e.message); }
}

function tfNovaTarefa() {
  abrirModal({
    eyebrow: 'Tarefas',
    titulo: 'Nova tarefa',
    corpoHtml: `
      <form id="form-tarefa">
        <div class="field"><label>Título</label><input name="titulo" required></div>
        <div class="field"><label>Descrição</label><textarea name="descricao" rows="3"></textarea></div>
        <div class="grid2">
          <div class="field"><label>Prioridade</label>
            <select name="prioridade">
              <option value="baixa">Baixa</option>
              <option value="media" selected>Média</option>
              <option value="alta">Alta</option>
              <option value="urgente">Urgente</option>
            </select>
          </div>
          <div class="field"><label>Prazo</label><input type="date" name="prazo"></div>
        </div>
        <button class="btn btn-navy" type="submit" style="width:100%;margin-top:.4rem">Criar tarefa</button>
      </form>
    `,
  });

  document.getElementById('form-tarefa').addEventListener('submit', async (e) => {
    e.preventDefault();
    const f = e.target;
    try {
      await api('tarefas', {
        method: 'POST',
        body: JSON.stringify({
          titulo: f.titulo.value,
          descricao: f.descricao.value,
          prioridade: f.prioridade.value,
          prazo: f.prazo.value || null,
          ambiente: _tfAmbiente,
          projeto_id: _tfProjetoId || null,
          categoria_id: _tfCategoriaSelecionada || null,
        }),
      });
      toast('Tarefa criada');
      fecharModal();
      tfCarregarArvore();
      tfAtualizarProgressoProjetos();
    } catch (err) { toast(err.message); }
  });
}

function tfNovaSubtarefa(paiId) {
  abrirModal({
    eyebrow: 'Tarefas',
    titulo: 'Nova subtarefa',
    corpoHtml: `
      <form id="form-subtarefa">
        <div class="field"><label>Título</label><input name="titulo" required></div>
        <button class="btn btn-navy" type="submit" style="width:100%;margin-top:.4rem">Criar subtarefa</button>
      </form>
    `,
  });
  document.getElementById('form-subtarefa').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await api('tarefas', { method: 'POST', body: JSON.stringify({ titulo: e.target.titulo.value, tarefa_pai_id: paiId }) });
      toast('Subtarefa criada');
      fecharModal();
      _tfExpandido[paiId] = true;
      tfCarregarArvore();
    } catch (err) { toast(err.message); }
  });
}

function tfAbrirMoverPara(tarefaId) {
  const candidatas = _tfTarefas.filter((t) => t.id !== tarefaId && t.nivel < 3);
  abrirModal({
    eyebrow: 'Tarefas',
    titulo: 'Mover tarefa',
    corpoHtml: `
      <div class="field">
        <label>Nova tarefa-mãe</label>
        <select id="tf-select-mover">
          <option value="">— Tornar tarefa principal (sem mãe) —</option>
          ${candidatas.map((t) => `<option value="${t.id}">${esc(t.titulo)}</option>`).join('')}
        </select>
      </div>
      <button class="btn btn-navy" style="width:100%;margin-top:.6rem" onclick="tfConfirmarMover('${tarefaId}')">Mover</button>
    `,
  });
}

async function tfConfirmarMover(tarefaId) {
  const novoPaiId = document.getElementById('tf-select-mover').value || null;
  try {
    await api('tarefas?id=' + tarefaId, { method: 'PATCH', body: JSON.stringify({ tarefa_pai_id: novoPaiId }) });

function briefingToggleRede(redeId) {
  const checked = document.getElementById('bf-rede-' + redeId).checked;
  const ativas = new Set(_briefingAtual.redes_ativas);
  if (checked) ativas.add(redeId); else ativas.delete(redeId);
  _briefingAtual.redes_ativas = [...ativas];
  renderCamposRedesBriefing();
  briefingAutosave();
}

function toggleOlhinho(inputId) {
  const input = document.getElementById(inputId);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function briefingAutosave() {
  clearTimeout(_briefingSaveTimeout);
  document.getElementById('bf-save-status').textContent = '';
  _briefingSaveTimeout = setTimeout(salvarBriefing, 900);
}

async function salvarBriefing() {
  const d = _briefingAtual;
  d.descritivo = document.getElementById('bf-descritivo').value;
  REDES_BRIEFING.forEach((r) => {
    const campoEmail = document.getElementById('bf-' + r.id + '-email');
    const campoSenha = document.getElementById('bf-' + r.id + '-senha');
    if (d.redes_ativas.includes(r.id)) {
      d[r.id + '_email'] = campoEmail ? campoEmail.value : '';
      d[r.id + '_senha'] = campoSenha ? campoSenha.value : '';
    }
  });

  try {
    await api('briefing', { method: 'POST', body: JSON.stringify(d) });
    const status = document.getElementById('bf-save-status');
    if (status) {
      status.textContent = 'Salvo';
      status.style.opacity = '1';
      setTimeout(() => { status.style.opacity = '0'; }, 1500);
    }
  } catch (e) { toast(e.message); }
}

async function carregarArquivosBriefing(clienteId) {
  try {
    const { arquivos } = await api('briefing-arquivos?cliente_id=' + clienteId);
    _bfArquivos = arquivos || [];
    renderArquivosBriefing(clienteId);
  } catch (e) {
    const el = document.getElementById('bf-lista-arquivos');
    if (el) el.innerHTML = `<p class="sub" style="font-size:12.5px">${esc(e.message)}</p>`;
  }
}

function renderArquivosBriefing(clienteId) {
  const el = document.getElementById('bf-lista-arquivos');
  if (!el) return;
  if (_bfArquivos.length === 0) {
    el.innerHTML = `<p class="sub" style="font-size:12.5px">Nenhum arquivo enviado ainda.</p>`;
    return;
  }
  el.innerHTML = _bfArquivos.map((a) => `
    <div class="ae-sub-item">
      <a class="link" href="${esc(a.url)}" target="_blank" style="flex:1;font-size:13.5px">${esc(a.nome.replace(/^\d+_/, ''))}</a>
      <button class="ae-del" title="Remover" onclick="removerArquivoBriefing('${clienteId}', '${esc(a.nome)}')">✕</button>
    </div>
  `).join('');
}

async function enviarArquivoBriefing(clienteId, file) {
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    try {
      await api('briefing-arquivos', {
        method: 'POST',
        body: JSON.stringify({ cliente_id: clienteId, filename: file.name, base64 }),
      });
      toast('Arquivo enviado');
      carregarArquivosBriefing(clienteId);
    } catch (e) { toast(e.message); }
    document.getElementById('bf-input-arquivo').value = '';
  };
  reader.readAsDataURL(file);
}

async function removerArquivoBriefing(clienteId, filename) {
  try {
    await api('briefing-arquivos?cliente_id=' + clienteId + '&filename=' + encodeURIComponent(filename), { method: 'DELETE' });
    toast('Arquivo removido');
    carregarArquivosBriefing(clienteId);
  } catch (e) { toast(e.message); }
}

          nome: form.nome.value,
          razao_social: form.razao_social.value,
          tipo_documento: form.tipo_documento.value,
          cnpj_cpf: form.cnpj_cpf.value,
          segmento: form.segmento.value,
          interlocutor: form.interlocutor.value,
          telefone: form.telefone.value,
          produto_ids: seletorProdutos.getSelecionados(),
          diagnostico_externo_id: form.diagnostico_externo_id?.value || null,
        }),
      });

      if (arquivoLogo) {
        await enviarLogo(cliente.id, arquivoLogo);
      }

      toast('Cliente criado com sucesso');
      fecharModal();
      viewClientesLista();
    } catch (err) {
      toast(err.message);
      btn.disabled = false;
    }
  });
}

// Lê o arquivo como base64 e envia pra função que faz o upload no Storage
function enviarLogo(clienteId, file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = async () => {
      try {
        const base64 = reader.result.split(',')[1];
        await api('upload-logo', {
          method: 'POST',
          body: JSON.stringify({ cliente_id: clienteId, filename: file.name, base64 }),
        });
        resolve();
      } catch (err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

          <h1>Planejamento Estratégico</h1>
          <p class="sub" style="margin-bottom:1rem">Pilares estratégicos do período</p>
          <div class="ae-card">
            <div class="ae-card-title">Introdução</div>
            <div class="ae-field"><textarea id="ae-f-intro" rows="4" oninput="aeAutosave()"></textarea></div>
          </div>
          <div id="ae-pillar-list"></div>
        </div>

        <!-- TÁTICO -->
        <div id="ae-sec-tatico" class="ae-section">
          <div class="eyebrow">Plano de Assessoria</div>
          <h1>Plano de Ação Tático</h1>
          <p class="sub" style="margin-bottom:1rem">OKRs e Key Results com percentual de progresso</p>
          <div class="ae-card">
            <div class="ae-card-title">Informações do serviço</div>
            <div class="ae-row c3">
              <div class="ae-field"><label>Serviços</label><input id="ae-f-svc" oninput="aeAutosave()"></div>
              <div class="ae-field"><label>Período</label><input id="ae-f-per" oninput="aeAutosave()"></div>
              <div class="ae-field"><label>Horas / mês</label><input id="ae-f-hrs" oninput="aeAutosave()"></div>
            </div>
          </div>
          <div id="ae-okr-list"></div>
        </div>
      </div>
    </div>
  `;

  aeLoadIntoDom();
}

function aeGoSec(name, btn) {
  document.querySelectorAll('.ae-section').forEach((s) => s.classList.remove('active'));
  document.querySelectorAll('#ae-nav button').forEach((b) => b.classList.remove('active'));
  document.getElementById('ae-sec-' + name).classList.add('active');
  btn.classList.add('active');
}

function aeSet(id, v) { const el = document.getElementById(id); if (el) el.value = v || ''; }

function aeLoadIntoDom() {
  const d = aeData;
  aeSet('ae-f-name', d.name); aeSet('ae-f-year', d.year); aeSet('ae-f-cons', d.cons); aeSet('ae-f-brand', d.brand);
  aeSet('ae-f-intro', d.intro);
  aeSet('ae-f-svc', d.svc); aeSet('ae-f-per', d.per); aeSet('ae-f-hrs', d.hrs);
  aeLoadAtds(d.atendimentos);
  const pl = document.getElementById('ae-pillar-list'); pl.innerHTML = '';
  (d.pillars || []).forEach((p, i) => aeAddPillarDom(p, i));
  const ol = document.getElementById('ae-okr-list'); ol.innerHTML = '';
  (d.okrs || []).forEach((o, i) => aeAddOkrDom(o, i));
}

// ── ATENDIMENTOS ─────────────────────────────────────────
function aeLoadAtds(atds) {
  if (!atds || !atds.length) atds = [aeDefAtd()];
  aeCurrentAtd = 0;
  aeRenderAtdTabs(atds);
  aeRenderAtdPanel(atds[0], 0);
}

function aeRenderAtdTabs(atds) {
  document.getElementById('ae-atd-tabs').innerHTML = atds.map((a, i) => `
    <button class="ae-atd-tab ${i === aeCurrentAtd ? 'active' : ''}" onclick="aeSwitchAtd(${i})">
      ${esc(a.title) || 'Atendimento ' + (i + 1)}
      <span class="ae-del-tab" onclick="event.stopPropagation();aeRemoveAtd(${i})">✕</span>
    </button>`).join('');
}

function aeRenderAtdPanel(atd, idx) {
  document.getElementById('ae-atd-content').innerHTML = `
    <div class="ae-card">
      <div class="ae-card-title">Identificação do atendimento</div>
      <div class="ae-row c2">
        <div class="ae-field"><label>Título do atendimento</label><input id="ae-atd-title-${idx}" placeholder="Ex: Reunião de alinhamento mensal" value="${esc(atd.title)}" oninput="aeAutosave()"></div>
        <div class="ae-field"><label>Data do encontro</label><input type="date" id="ae-atd-date-${idx}" value="${esc(atd.date)}" oninput="aeAutosave()"></div>
      </div>
    </div>
    <div class="ae-card">
      <div class="ae-card-title">Assuntos abordados <button class="ae-add" style="margin-left:auto" onclick="aeAddSub(${idx})">+ Adicionar</button></div>
      <div class="ae-tip">Aparecem como itens marcáveis no relatório impresso.</div>
      <div id="ae-sub-list-${idx}"></div>
    </div>
    <div class="ae-card">
      <div class="ae-card-title">Histórico de encontros <button class="ae-add" style="margin-left:auto" onclick="aeAddMtg(${idx})">+ Reunião</button></div>
      <table class="ae-dt"><thead><tr><th>Data</th><th>Horário</th><th>Duração</th></tr></thead><tbody id="ae-mtg-list-${idx}"></tbody></table>
    </div>
    <div class="ae-card">
      <div class="ae-card-title">Observações</div>
      <div class="ae-field"><textarea id="ae-atd-obs-${idx}" rows="4" oninput="aeAutosave()" placeholder="Observações do encontro...">${esc(atd.obs)}</textarea></div>
    </div>
    <div class="ae-card">
      <div class="ae-card-title">Tarefas operacionais <button class="ae-add" style="margin-left:auto" onclick="aeAddTask(${idx})">+ Tarefa</button></div>
      <table class="ae-dt"><thead><tr><th style="width:30px">#</th><th>Tarefa</th><th style="width:120px">Responsável</th><th style="width:110px">Entrega</th><th style="width:88px">Status</th></tr></thead><tbody id="ae-task-list-${idx}"></tbody></table>
    </div>
  `;
  (atd.subjects || ['']).forEach((s) => aeAddSubDom(idx, s));
  (atd.meetings || []).forEach((m) => aeAddMtgDom(idx, m));
  (atd.tasks || []).forEach((t, n) => aeAddTaskDom(idx, t, n + 1));
}

function aeSwitchAtd(idx) {
  aeCollectAtdInto(aeCurrentAtd);
  aeCurrentAtd = idx;
  aeRenderAtdTabs(aeData.atendimentos);
  aeRenderAtdPanel(aeData.atendimentos[idx], idx);
}

function aeAddAtendimento() {
  aeCollectAtdInto(aeCurrentAtd);
  aeData.atendimentos.push(aeDefAtd());
  aeCurrentAtd = aeData.atendimentos.length - 1;
  aeRenderAtdTabs(aeData.atendimentos);
  aeRenderAtdPanel(aeData.atendimentos[aeCurrentAtd], aeCurrentAtd);
  aeAutosave();
}

function aeRemoveAtd(idx) {
  if (aeData.atendimentos.length <= 1) { toast('Deve existir ao menos um atendimento.'); return; }
  if (!confirm('Excluir este atendimento? Os dados serão perdidos.')) return;
  aeData.atendimentos.splice(idx, 1);
  aeCurrentAtd = Math.max(0, idx - 1);
  aeRenderAtdTabs(aeData.atendimentos);
  aeRenderAtdPanel(aeData.atendimentos[aeCurrentAtd], aeCurrentAtd);
  aeAutosave();
}

function aeCollectAtdInto(idx) {
  const panel = document.getElementById('ae-atd-title-' + idx);
  if (!panel) return;
  const title = document.getElementById('ae-atd-title-' + idx)?.value || '';
  const date = document.getElementById('ae-atd-date-' + idx)?.value || '';
  const obs = document.getElementById('ae-atd-obs-' + idx)?.value || '';
  const subjects = [...document.querySelectorAll('#ae-sub-list-' + idx + ' .ae-sub-item input')].map((i) => i.value);
  const meetings = [...document.querySelectorAll('#ae-mtg-list-' + idx + ' tr')].map((tr) => { const i = tr.querySelectorAll('input'); return { date: i[0]?.value || '', time: i[1]?.value || '', dur: i[2]?.value || '' }; });
  const tasks = [...document.querySelectorAll('#ae-task-list-' + idx + ' tr')].map((tr) => { const i = tr.querySelectorAll('input'); const s = tr.querySelector('select'); return { label: i[0]?.value || '', resp: i[1]?.value || '', dl: i[2]?.value || '', done: s?.value === 'done' }; });
  aeData.atendimentos[idx] = { title, date, subjects, meetings, obs, tasks };
}

function aeAddSub(idx) { aeAddSubDom(idx, ''); aeAutosave(); }
function aeAddSubDom(idx, v) {
  const d = document.createElement('div'); d.className = 'ae-sub-item';
  d.innerHTML = `<input type="text" placeholder="Assunto abordado" value="${esc(v)}" oninput="aeAutosave()"><button class="ae-del" onclick="this.parentElement.remove();aeAutosave()">✕</button>`;
  document.getElementById('ae-sub-list-' + idx).appendChild(d);
}
function aeAddMtg(idx) { aeAddMtgDom(idx, { date: '', time: '', dur: '' }); aeAutosave(); }
function aeAddMtgDom(idx, m) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td><input type="text" placeholder="dd/mm/aaaa" value="${esc(m.date)}" oninput="aeAutosave()"></td><td><input type="text" placeholder="HH:MM às HH:MM" value="${esc(m.time)}" oninput="aeAutosave()"></td><td><input type="text" placeholder="1h" value="${esc(m.dur)}" oninput="aeAutosave()"></td>`;
  document.getElementById('ae-mtg-list-' + idx).appendChild(tr);
}
function aeAddTask(idx) { aeAddTaskDom(idx, { label: '', resp: '', dl: '', done: false }, document.getElementById('ae-task-list-' + idx).querySelectorAll('tr').length + 1); aeAutosave(); }
function aeAddTaskDom(idx, t, n) {
  const tr = document.createElement('tr');
  tr.innerHTML = `<td class="ae-rnum">${String(n).padStart(2, '0')}</td><td><input type="text" placeholder="Descrição" value="${esc(t.label)}" oninput="aeAutosave()"></td><td><input type="text" placeholder="Responsável" value="${esc(t.resp)}" oninput="aeAutosave()"></td><td><input type="text" placeholder="dd/mm/aaaa" value="${esc(t.dl)}" oninput="aeAutosave()"></td><td><select onchange="aeAutosave()"><option value="pending" ${!t.done ? 'selected' : ''}>Pendente</option><option value="done" ${t.done ? 'selected' : ''}>Feito</option></select></td>`;
  document.getElementById('ae-task-list-' + idx).appendChild(tr);
}

// ── PILARES ──────────────────────────────────────────────
function aeAddPillarDom(p, i) {
  const d = document.createElement('div'); d.className = 'ae-card';
  d.innerHTML = `
    <div class="ae-card-title"><span class="ae-pillar-n">${i + 1}</span>&nbsp;Pilar ${i + 1}</div>
    <div class="ae-field" style="margin-bottom:.9rem"><label>Nome</label><input class="ae-pn" value="${esc(p.name)}" oninput="aeAutosave()"></div>
    <div class="ae-field"><label>Descrição</label><textarea class="ae-pd" rows="3" oninput="aeAutosave()">${esc(p.desc)}</textarea></div>
  `;
  document.getElementById('ae-pillar-list').appendChild(d);
}

// ── OKRS ─────────────────────────────────────────────────
function aeAddOkrDom(o, i) {
  const d = document.createElement('div'); d.className = 'ae-card';
  const kh = `<div class="ae-kr-hdr"><span>Key Result</span><span style="text-align:center">%</span></div>`;
  const ki = (o.krs || []).map((k) => `<div class="ae-okr-item"><input type="text" class="ae-kl" value="${esc(k.l)}" placeholder="Key Result" oninput="aeAutosave()"><input type="number" class="ae-kp" value="${k.p || 0}" min="0" max="100" oninput="aeAutosave()"></div>`).join('');
  d.innerHTML = `
    <div class="ae-card-title">OKR ${i + 1}</div>
    <div class="ae-field" style="margin-bottom:.9rem"><label>Objetivo</label><textarea class="ae-oo" rows="2" oninput="aeAutosave()">${esc(o.obj)}</textarea></div>
    ${kh}<div class="ae-okr-krs">${ki}</div>
    <button class="ae-add" style="margin-top:.6rem" onclick="aeAddKR(this)">+ Key Result</button>
  `;
  document.getElementById('ae-okr-list').appendChild(d);
}
function aeAddKR(btn) {
  const d = document.createElement('div'); d.className = 'ae-okr-item';
  d.innerHTML = `<input type="text" class="ae-kl" placeholder="Novo Key Result" oninput="aeAutosave()"><input type="number" class="ae-kp" value="0" min="0" max="100" oninput="aeAutosave()">`;
  btn.previousElementSibling.appendChild(d);
  aeAutosave();
}

// ── COLETA / AUTOSAVE ───────────────────────────────────
function aeCollect() {
  aeCollectAtdInto(aeCurrentAtd);
  return {
    name: document.getElementById('ae-f-name')?.value || '',
    year: document.getElementById('ae-f-year')?.value || '',
    cons: document.getElementById('ae-f-cons')?.value || '',
    brand: document.getElementById('ae-f-brand')?.value || '',
    seg: aeData.seg || '',
    intro: document.getElementById('ae-f-intro')?.value || '',
    svc: document.getElementById('ae-f-svc')?.value || '',
    per: document.getElementById('ae-f-per')?.value || '',
    hrs: document.getElementById('ae-f-hrs')?.value || '',
    atendimentos: aeData.atendimentos,
    pillars: [...document.querySelectorAll('#ae-pillar-list .ae-card')].map((c) => ({ name: c.querySelector('.ae-pn')?.value || '', desc: c.querySelector('.ae-pd')?.value || '' })),
    okrs: [...document.querySelectorAll('.ae-oo')].map((el) => { const c = el.closest('.ae-card'); return { obj: el.value, krs: [...c.querySelectorAll('.ae-okr-item')].map((it) => ({ l: it.querySelector('.ae-kl')?.value || '', p: parseInt(it.querySelector('.ae-kp')?.value) || 0 })).filter((k) => k.l) }; }),
  };
}

function aeAutosave() {
  document.getElementById('ae-side-name').textContent = document.getElementById('ae-f-name')?.value || aeCliente.nome;
  clearTimeout(aeSaveTimer);
  aeSaveTimer = setTimeout(aeSaveNow, 900);
}

async function aeSaveNow() {
  aeData = aeCollect();
  try {
    await api('assessoria-relatorio', { method: 'POST', body: JSON.stringify({ cliente_id: aeClienteId, dados: aeData }) });
    const el = document.getElementById('ae-save');
    el.textContent = 'Salvo automaticamente'; el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, 1800);
  } catch (e) { toast(e.message); }
}

// ── RELATÓRIO ────────────────────────────────────────────
function aeBc(p) { return p >= 70 ? '#0f8a6e' : p >= 30 ? '#c2820f' : p > 0 ? '#d3455a' : 'var(--line)'; }
function aeFd(s) { if (!s) return ''; const d = new Date(s + 'T12:00:00'); return isNaN(d) ? s : d.toLocaleDateString('pt-BR'); }

function aeBuildAtdHtml(atd) {
  const subs = (atd.subjects || []).filter(Boolean).map((s) => `<div class="rsub-item"><div class="rcheck"></div><span>${esc(s)}</span></div>`).join('');
  const mtgs = (atd.meetings || []).filter((m) => m.date || m.time).map((m) => `<tr><td>${esc(m.date)}</td><td>${esc(m.time)}</td><td>${esc(m.dur)}</td></tr>`).join('');
  const tasks = (atd.tasks || []).filter((t) => t.label).map((t, i) => `<tr><td>${String(i + 1).padStart(2, '0')}</td><td class="${t.done ? 'tdone' : ''}">${esc(t.label)}</td><td class="${t.done ? 'tdone' : 'tresp'}">${esc(t.resp)}</td><td class="${t.done ? 'tdone' : ''}">${esc(t.dl)}</td></tr>`).join('');
  return { subs, mtgs, tasks };
}

function aeGenerateReport() {
  aeData = aeCollect();
  aeSaveNow();
  const d = aeData;
  const atd = d.atendimentos[aeCurrentAtd] || aeDefAtd();
  const atdLabel = atd.title || ('Atendimento ' + (aeCurrentAtd + 1));
  aeBuildAndShowReport(d, atd, atdLabel);
}

function aePrintReport() {
  aeGenerateReport();
  setTimeout(() => window.print(), 350);
}

function aeBuildAndShowReport(d, atd, atdLabel) {
  const { subs, mtgs, tasks } = aeBuildAtdHtml(atd);
  const pillars = (d.pillars || []).map((p, i) => `<div class="rpillar"><div class="rpillar-n">${i + 1}</div><div class="rpillar-c"><div class="rpillar-tag">${esc(p.name)}</div><div class="rpillar-desc">${esc(p.desc)}</div></div></div>`).join('');
  const okrs = (d.okrs || []).map((o, i) => `<div class="rokrg"><div class="rokr-h">${i + 1} — ${esc(o.obj)}</div>${(o.krs || []).map((k) => { const c = aeBc(k.p); return `<div class="rkr"><div class="rkr-l">${esc(k.l)}</div><div class="rkr-bw"><div class="rkr-b" style="width:${k.p}%;background:${c}"></div></div><div class="rkr-p" style="color:${c}">${k.p}%</div></div>`; }).join('')}</div>`).join('');

  document.getElementById('ae-preview-content').innerHTML = `
    <div class="rh">
      <img src="logo-completo.png" alt="D2N" style="height:34px" onerror="this.style.display='none'">
      <div class="rh-year">${esc(d.year)}</div>
    </div>
    <div class="rcov">
      <div class="rcov-t">Relatório<br>de Assessoria</div>
      <div class="rcov-rule"></div>
      <div class="rcov-name">${esc((d.name || '').toUpperCase())}</div>
      <div class="rcov-cons">CONSULTOR(ES): ${esc((d.cons || '').toUpperCase())}</div>
    </div>
    <div class="rs">
      <div class="rs-hdr"><div class="rs-title">${esc(atdLabel)}</div><div class="rs-badge">Data: ${aeFd(atd.date) || '—'}</div></div>
      <div class="r2col">
        <div class="rbox"><h4>Assuntos abordados</h4>${subs || '<p style="font-size:12px;color:var(--ink-faint)">Nenhum assunto registrado.</p>'}</div>
        <div>
          <div class="rbox" style="margin-bottom:12px"><table class="rmt"><thead><tr><th>Data</th><th>Horário</th><th>Duração</th></tr></thead><tbody>${mtgs}</tbody></table></div>
          <div class="rbox"><h4>Observações</h4><p style="font-size:12.5px;color:var(--ink-soft);line-height:1.6">${esc(atd.obs) || '—'}</p></div>
        </div>
      </div>
      <table class="rtasks"><thead><tr><th></th><th>Tarefas operacionais</th><th>Responsável</th><th>Entrega</th></tr></thead><tbody>${tasks}</tbody></table>
      <div class="rsig"><h4>Assinatura</h4><div class="rsig-line"></div></div>
    </div>
    <div class="rs">
      <div class="rs-title" style="margin-bottom:14px">Planejamento Estratégico ${esc(d.year)}</div>
      <p class="rintro">${esc(d.intro)}</p>${pillars}
    </div>
    <div class="rs">
      <div class="rs-title" style="margin-bottom:14px">Plano de Ação — Tático</div>
      <table class="rsvc"><thead><tr><th>Serviço</th><th>Período</th><th>Horas/mês</th></tr></thead><tbody><tr><td>${esc(d.svc) || '—'}</td><td>${esc(d.per) || '—'}</td><td>${esc(d.hrs) || '—'}</td></tr></tbody></table>
      ${okrs}
    </div>
    <div class="rback"><img src="logo-completo.png" alt="D2N" style="height:30px;opacity:.85" onerror="this.style.display='none'"></div>
  `;
  document.getElementById('ae-preview').classList.add('open');
}

function pontuacaoArea(respostas, areaId) {
  const area = AREAS_DIAG.find((a) => a.id === areaId);
  const vals = area.perguntas.map((_, i) => {
    const v = respostas[areaId]?.[i];
    return v >= 0 ? v + 1 : 1;
  });
  return Math.round((vals.reduce((s, v) => s + v, 0) / (area.perguntas.length * 5)) * 100);
}
function pontuacaoGeral(respostas) {
  return Math.round(AREAS_DIAG.reduce((s, a) => s + pontuacaoArea(respostas, a.id), 0) / AREAS_DIAG.length);
}
function nivelArea(score) {
  if (score < 25) return 1; if (score < 45) return 2; if (score < 65) return 3; if (score < 85) return 4; return 5;
}
function statusDiag(score) {
  if (score < 40) return { label: 'Crítico', cor: '#d3455a' };
  if (score < 60) return { label: 'Atenção', cor: '#c2820f' };
  if (score < 80) return { label: 'Bom', cor: '#0f8a6e' };
  return { label: 'Excelente', cor: 'var(--navy-700)' };
}
function areaCompleta(respostas, areaId) {
  return AREAS_DIAG.find((a) => a.id === areaId).perguntas.every((_, i) => respostas[areaId]?.[i] >= 0);
}
function todasCompletas(respostas) {
  return AREAS_DIAG.every((a) => areaCompleta(respostas, a.id));
}

let _abaDiagAtual = 'externo';

async function viewDiagnosticoLista() {
  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Negócios</div>
    <h1>Diagnóstico</h1>
    <div class="tabs" style="margin-top:1.25rem">
      <button class="tab ${_abaDiagAtual === 'externo' ? 'active' : ''}" data-tab="externo">Em negociação</button>
      <button class="tab ${_abaDiagAtual === 'ativo' ? 'active' : ''}" data-tab="ativo">Ativos</button>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      ${htmlBusca('busca-diagnostico', 'Buscar...')}
      <button class="btn btn-grad" onclick="toggleFormDiagnostico()">Novo diagnóstico</button>
    </div>
    <div id="grade-diagnostico">${htmlCarregando()}</div>
  `;

  document.querySelectorAll('.tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      _abaDiagAtual = btn.dataset.tab;
      viewDiagnosticoLista();
    });
  });

  const chaveCache = 'diagnostico_' + _abaDiagAtual;
  if (_cacheListas[chaveCache]) {
    const cache = _cacheListas[chaveCache];
    renderGradeDiagnostico(cache);
    ligarBusca('busca-diagnostico', (termo) => {
      renderGradeDiagnostico(cache.filter((d) =>
        (d.clientes?.nome || d.nome_prospect || '').toLowerCase().includes(termo)
      ));
    });
  }

  try {
    const { diagnosticos } = await api('diagnosticos?tipo=' + _abaDiagAtual);
    _cacheListas[chaveCache] = diagnosticos || [];
    renderGradeDiagnostico(diagnosticos || []);
    ligarBusca('busca-diagnostico', (termo) => {
      renderGradeDiagnostico((diagnosticos || []).filter((d) =>
        (d.clientes?.nome || d.nome_prospect || '').toLowerCase().includes(termo)
      ));
    });
  } catch (e) {
    if (!_cacheListas[chaveCache]) {
      document.getElementById('grade-diagnostico').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
    }
  }
}

async function excluirDiagnostico(id) {
  if (!confirm('Excluir este diagnóstico? Essa ação não pode ser desfeita.')) return;
  try {
    await api('diagnosticos?id=' + id, { method: 'DELETE' });
    toast('Diagnóstico excluído');
    viewDiagnosticoLista();
  } catch (e) { toast(e.message); }
}

function renderGradeDiagnostico(lista) {
  const el = document.getElementById('grade-diagnostico');
  if (!lista || lista.length === 0) {
    el.innerHTML = `<p class="empty">Nenhum diagnóstico encontrado.</p>`;
    return;
  }
  el.innerHTML = `
    <div class="grade-clientes">
      ${lista.map((d) => {
        const nome = d.clientes?.nome || d.nome_prospect || 'Sem nome';
        const concluido = d.status === 'concluido';
        const score = concluido ? pontuacaoGeral(d.respostas || {}) : null;
        const st = score !== null ? statusDiag(score) : null;
        return `
          <div class="card-cliente" onclick="location.hash='#/diagnostico/${d.id}'">
            <div class="topo">
              <div class="logo-fallback">${esc(nome.slice(0, 2))}</div>
              <div>
                <div class="nome-cliente">${esc(nome)}</div>
                <div class="segmento-cliente">${esc(d.clientes?.segmento || d.segmento_prospect) || '—'}</div>
              </div>
              ${usuario.role === 'admin' ? `<button class="ae-del" style="margin-left:auto" title="Excluir" onclick="event.stopPropagation();excluirDiagnostico('${d.id}')">✕</button>` : ''}
            </div>
            <div class="rodape-card">
              <span class="pill">${concluido ? 'Concluído' : 'Em andamento'}</span>
              ${score !== null ? `<span style="font-family:'Sora',sans-serif;font-weight:700;font-size:13px;color:${st.cor}">${score}%</span>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}
