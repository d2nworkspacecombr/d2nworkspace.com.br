        <div class="field"><label>Nome (prospect / empresa)</label><input name="nome_prospect" required></div>
        <div class="field"><label>Segmento</label><input name="segmento_prospect"></div>
        <div class="field"><label>Interlocutor</label><input name="interlocutor"></div>
        <button class="btn btn-navy" type="submit" style="width:100%;margin-top:.4rem">Iniciar diagnóstico</button>
      </form>
    `,
  });

  if (_abaDiagAtual === 'ativo') {
    api('clientes').then(({ clientes }) => {
      document.getElementById('sel-cliente-diag').innerHTML =
        '<option value="">Selecione...</option>' +
        (clientes || []).map((c) => `<option value="${c.id}">${esc(c.nome)}</option>`).join('');
    });
  }

  document.getElementById('form-novo-diag').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    try {
      const body = _abaDiagAtual === 'ativo'
        ? { cliente_id: form.cliente_id.value, interlocutor: form.interlocutor.value }
        : { nome_prospect: form.nome_prospect.value, segmento_prospect: form.segmento_prospect.value, interlocutor: form.interlocutor.value };
      const { diagnostico } = await api('diagnosticos', { method: 'POST', body: JSON.stringify(body) });
      fecharModal();
      location.hash = '#/diagnostico/' + diagnostico.id;
    } catch (err) { toast(err.message); }
  });
}

// ============================================================================
// VIEW: DIAGNÓSTICO — DETALHE (quiz ou resultado, dependendo do status)
// ============================================================================
let _diagAtual = null;
let _areaDiagAtual = 0;

async function viewDiagnosticoDetalhe(id) {
  document.getElementById('main').innerHTML = `${htmlCarregando()}`;
  try {
    const { diagnostico } = await api('diagnosticos?id=' + id);
    _diagAtual = diagnostico;
  } catch (e) {
    document.getElementById('main').innerHTML = `<p class="empty">${esc(e.message)}</p>`;
    return;
  }

  if (_diagAtual.status === 'concluido') {
    renderResultadoDiagnostico();
  } else {
    _areaDiagAtual = 0;
    renderQuizDiagnostico();
  }
}

function nomeDoDiag(d) {
  return d.clientes?.nome || d.nome_prospect || 'Sem nome';
}

function renderQuizDiagnostico() {
  const d = _diagAtual;
  const respondidas = AREAS_DIAG.reduce((s, a) => s + a.perguntas.filter((_, i) => d.respostas[a.id]?.[i] >= 0).length, 0);
  const total = AREAS_DIAG.reduce((s, a) => s + a.perguntas.length, 0);

  document.getElementById('main').innerHTML = `
    <div class="eyebrow">Diagnóstico</div>
    <h1>${esc(nomeDoDiag(d))}</h1>
    <p class="sub" style="margin-bottom:1rem">${d.interlocutor ? 'Interlocutor: ' + esc(d.interlocutor) : ''} · ${respondidas}/${total} perguntas respondidas</p>
    <div class="tabs" id="tabs-area-diag">
      ${AREAS_DIAG.map((a, i) => `<button class="tab ${i === _areaDiagAtual ? 'active' : ''}" data-area="${i}">${a.icone} ${a.label}</button>`).join('')}
    </div>
    <div id="perguntas-area"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:1.5rem">
      <button class="btn btn-grad" id="btn-finalizar-diag" ${todasCompletas(d.respostas) ? '' : 'disabled'}>Finalizar diagnóstico</button>
    </div>
  `;

  document.querySelectorAll('#tabs-area-diag .tab').forEach((btn) => {
    btn.addEventListener('click', () => {
      _areaDiagAtual = Number(btn.dataset.area);
      renderQuizDiagnostico();
    });
  });

  document.getElementById('btn-finalizar-diag').addEventListener('click', finalizarDiagnostico);

  renderPerguntasArea();
}

function renderPerguntasArea() {
  const d = _diagAtual;
  const area = AREAS_DIAG[_areaDiagAtual];
  document.getElementById('perguntas-area').innerHTML = area.perguntas.map((p, i) => {
    const valorAtual = d.respostas[area.id]?.[i];
    return `
      <div class="card" style="margin-bottom:.75rem">
        <div style="font-size:13.5px;font-weight:600;color:var(--navy-700);margin-bottom:.7rem">${i + 1}. ${esc(p.q)}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${p.opts.map((opt, oi) => `
            <label style="display:flex;align-items:flex-start;gap:9px;font-size:13px;color:var(--ink-soft);cursor:pointer;padding:6px 8px;border-radius:6px;
              background:${valorAtual === oi ? 'var(--teal-soft)' : 'transparent'}">
              <input type="radio" name="p${i}" ${valorAtual === oi ? 'checked' : ''} onchange="responderPergunta('${area.id}', ${i}, ${oi})" style="margin-top:2px">
              ${esc(opt)}
            </label>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');
}

async function responderPergunta(areaId, perguntaIndex, valor) {
  const d = _diagAtual;
  if (!d.respostas[areaId]) d.respostas[areaId] = {};
  d.respostas[areaId][perguntaIndex] = valor;

  try {
    await api('diagnosticos?id=' + d.id, { method: 'PATCH', body: JSON.stringify({ respostas: d.respostas }) });
  } catch (e) { toast(e.message); }

  document.getElementById('btn-finalizar-diag').disabled = !todasCompletas(d.respostas);
}

async function finalizarDiagnostico() {
  const d = _diagAtual;
  const resultado = {
    geral: pontuacaoGeral(d.respostas),
    areas: AREAS_DIAG.reduce((acc, a) => { acc[a.id] = pontuacaoArea(d.respostas, a.id); return acc; }, {}),
  };
  try {
    const { diagnostico } = await api('diagnosticos?id=' + d.id, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'concluido', resultado }),
    });
    _diagAtual = diagnostico;
    toast('Diagnóstico concluído');
    renderResultadoDiagnostico();
  } catch (e) { toast(e.message); }
}

function renderResultadoDiagnostico() {
  const d = _diagAtual;
  const geral = pontuacaoGeral(d.respostas);
  const stGeral = statusDiag(geral);
  const scores = AREAS_DIAG.map((a) => ({ ...a, score: pontuacaoArea(d.respostas, a.id) }));
  const ordenadas = [...scores].sort((a, b) => a.score - b.score);

  document.getElementById('main').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;flex-wrap:wrap;gap:1rem">
      <div>
        <div class="eyebrow">Diagnóstico concluído</div>
        <h1>${esc(nomeDoDiag(d))}</h1>
        ${d.interlocutor ? `<p class="sub">Interlocutor: ${esc(d.interlocutor)}</p>` : ''}
      </div>
      <button class="btn btn-outline" onclick="location.hash='#/diagnostico'">← Voltar</button>
    </div>

    <div class="card" style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1.25rem">
      <div style="font-family:'Sora',sans-serif;font-size:42px;font-weight:700;color:${stGeral.cor}">${geral}<span style="font-size:20px">%</span></div>
      <div>
        <div style="font-family:'Sora',sans-serif;font-size:13px;font-weight:600;color:var(--navy-700)">Maturidade geral do negócio</div>
        <span class="pill" style="margin-top:4px">${stGeral.label}</span>
      </div>
    </div>

    <div class="grade-clientes" style="margin-bottom:1.5rem">
      ${scores.map((a) => {
        const st = statusDiag(a.score);
        return `
          <div class="card" style="text-align:center">
            <div style="font-size:22px;margin-bottom:6px">${a.icone}</div>
            <div style="font-family:'Sora',sans-serif;font-size:12.5px;font-weight:600;color:var(--navy-700)">${a.label}</div>
            <div style="font-family:'Sora',sans-serif;font-size:24px;font-weight:700;color:${st.cor};margin:4px 0">${a.score}%</div>
            <div class="prog-track"><div class="prog-fill" style="width:${a.score}%;background:${st.cor}"></div></div>
            <div style="font-size:11px;color:${st.cor};margin-top:6px;font-weight:600">${st.label}</div>
          </div>
        `;
      }).join('')}
    </div>

    <h2 style="font-family:'Sora',sans-serif;font-size:16px;color:var(--navy-700);margin-bottom:.9rem">Diagnóstico por área</h2>
    ${scores.map((a, idx) => {
      const nivel = nivelArea(a.score);
      const texto = TEXTOS_DIAG[a.id][nivel];
      const acoes = ACOES_DIAG[a.id][nivel];
      const prod = PRODUTOS_DIAG[a.id];
      const st = statusDiag(a.score);
      return `
        <details class="card" style="margin-bottom:.75rem" ${idx === 0 ? 'open' : ''}>
          <summary style="cursor:pointer;display:flex;align-items:center;gap:10px;font-family:'Sora',sans-serif;font-weight:600;color:var(--navy-700)">
            <span>${a.icone}</span><span style="flex:1">${a.label}</span><span style="color:${st.cor}">${a.score}%</span>
          </summary>
          <div style="margin-top:1rem">
            <p class="sub" style="font-size:13px;color:var(--ink-soft);line-height:1.6">${esc(texto)}</p>
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-faint);margin:1rem 0 .5rem">Ações prioritárias</div>
            ${acoes.map((ac) => `<div style="font-size:13px;color:var(--ink-soft);margin-bottom:6px;padding-left:14px;border-left:2px solid var(--teal)">${esc(ac)}</div>`).join('')}
            ${a.score < 65 ? `
              <div style="background:var(--paper);border-radius:8px;padding:.9rem 1rem;margin-top:1rem">
                <div style="font-size:11px;font-weight:700;text-transform:uppercase;color:var(--teal-deep);margin-bottom:4px">Solução D2N indicada</div>
                <div style="font-family:'Sora',sans-serif;font-weight:600;font-size:13.5px;color:var(--navy-700)">${esc(prod.nome)}</div>
                <div style="font-size:12.5px;color:var(--ink-soft);margin-top:3px">${esc(prod.desc)}</div>
              </div>
            ` : ''}
          </div>
        </details>
      `;
    }).join('')}

    <div style="display:flex;gap:10px;margin-top:1rem">
      <button class="btn btn-outline" onclick="window.print()">Imprimir / Exportar PDF</button>
      <button class="btn btn-outline" onclick="refazerDiagnostico()">Refazer diagnóstico</button>
    </div>
  `;
}

async function refazerDiagnostico() {
  try {
    const { diagnostico } = await api('diagnosticos?id=' + _diagAtual.id, {
      method: 'PATCH',
      body: JSON.stringify({ status: 'rascunho', respostas: {} }),
    });
    _diagAtual = diagnostico;
    _areaDiagAtual = 0;
    renderQuizDiagnostico();
  } catch (e) { toast(e.message); }
}
</script>
</body>
</html>
